async function doDist(){
  const id=window._distId; if(!id) return;
  const item=DB[id]; if(!item) return;
  const qty=Math.max(1,parseInt(document.getElementById("dist-qty")?.value)||1);
  const type=document.querySelector('input[name="dist-type"]:checked')?.value||"used";
  if(qty>(item.qty||0)){ alert(`Only ${item.qty||0} in stock — can't remove ${qty}.`); return; }
  const newQty=(item.qty||0)-qty;
  const who=localStorage.getItem("inv_display_name")||(currentUser?.displayName||currentUser?.email||"Unknown");
  const now=Date.now();
  const week=isoWeek(now);
  const fac=getFacility(item.location);
  silentClose();
  DB[id].qty=newQty;
  await update(ref(db,`items/${id}`),{qty:newQty});
  await set(push(ref(db,"usage")),{name:item.name,qty,type,facility:fac,location:item.location,week,ts:now,who,date:new Date(now).toLocaleDateString()});
  await fLog(`${type==="used"?"Distributed":"Wasted"} ${qty}× "${item.name}" from ${item.location} → ${newQty} remaining`);
  render();
}

let _trkRange="4w";
let _trkShow="used";

function setTrkRange(v){ _trkRange=v; render(); }
function setTrkShow(v){  _trkShow=v;  render(); }

function renderTracker(app){
  const entries=Object.values(USAGE);
  const now=Date.now();
  const rangeMs={"1w":7*86400000,"4w":28*86400000,"month":30*86400000};
  const cutoff=now-(rangeMs[_trkRange]||28*86400000);
  const inRange=entries.filter(e=>e.ts>=cutoff);
  const thisWeek=isoWeek(now);

  const weekSet=new Set(entries.map(e=>e.week||isoWeek(e.ts)));
  const allWeeks=[...weekSet].sort().reverse();
  const showWeeks=allWeeks.slice(0,4);

  const rangeBtn=(v,lbl)=>`<button onclick="setTrkRange('${v}')" style="padding:6px 14px;border-radius:var(--r);border:1px solid ${_trkRange===v?"var(--scarlet)":"var(--border2)"};background:${_trkRange===v?"var(--scarlet)":"var(--bg)"};color:${_trkRange===v?"#fff":"var(--text2)"};font-size:12px;font-weight:600;cursor:pointer">${lbl}</button>`;
  const showBtn=(v,lbl)=>`<button onclick="setTrkShow('${v}')" style="padding:6px 14px;border-radius:var(--r);border:1px solid ${_trkShow===v?"var(--scarlet)":"var(--border2)"};background:${_trkShow===v?"var(--scarlet)":"var(--bg)"};color:${_trkShow===v?"#fff":"var(--text2)"};font-size:12px;font-weight:600;cursor:pointer">${lbl}</button>`;

  let h=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;justify-content:space-between;margin-bottom:16px">
    <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px">Date Range</div>
      <div style="display:flex;gap:6px">${rangeBtn("1w","This Week")}${rangeBtn("4w","Last 4 Weeks")}${rangeBtn("month","This Month")}</div></div>
    <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px">Show</div>
      <div style="display:flex;gap:6px">${showBtn("used","Distributed")}${showBtn("waste","Wasted")}${showBtn("both","Both")}</div></div>
  </div>`;

  const filtered=inRange.filter(e=>_trkShow==="both"||e.type===_trkShow);
  const names=[...new Set(filtered.map(e=>e.name))].sort();

  if(!names.length){
    h+=`<div class="card"><div class="empty"><div class="empty-icon">📊</div>No data yet for this range.<br><div style="font-size:13px;margin-top:8px;color:var(--text3)">Use the 📉 button on inventory items to log distributions.</div></div></div>`;
    app.innerHTML=h; return;
  }

  // Build data[name][facility][week]=qty
  const data={};
  filtered.forEach(e=>{
    if(!data[e.name]) data[e.name]={};
    const fac=e.facility||getFacility(e.location||"");
    if(!data[e.name][fac]) data[e.name][fac]={};
    data[e.name][fac][e.week||isoWeek(e.ts)]=(data[e.name][fac][e.week||isoWeek(e.ts)]||0)+e.qty;
  });

  function trend(vals){
    const nonzero=vals.filter(v=>v>0);
    if(nonzero.length<2) return "→";
    const latest=vals[0], rest=vals.slice(1).filter(v=>v>0);
    if(!rest.length) return "→";
    const avg=rest.reduce((s,v)=>s+v,0)/rest.length;
    if(latest>avg*1.1) return "↑";
    if(latest<avg*0.9) return "↓";
    return "→";
  }
  const trendClr=t=>t==="↑"?"var(--scarlet)":t==="↓"?"var(--blue)":"var(--text3)";

  ["APC/JMA","Rodkin"].forEach(fac=>{
    const facNames=names.filter(n=>data[n]?.[fac]);
    if(!facNames.length) return;

    let thead=`<tr><th style="min-width:180px">Item</th>`;
    showWeeks.forEach(w=>{ thead+=`<th style="text-align:right;white-space:nowrap;min-width:100px">${w===thisWeek?"This Week":weekLabel(w)}</th>`; });
    thead+=`<th style="text-align:right;min-width:80px">4-Wk Avg</th><th style="text-align:center;width:52px">Trend</th></tr>`;

    let tbody="";
    facNames.forEach(name=>{
      const fd=data[name][fac]||{};
      const wvals=showWeeks.map(w=>fd[w]||0);
      const allVals=allWeeks.map(w=>fd[w]||0);
      const nonzero=allVals.filter(v=>v>0);
      const avg=nonzero.length?Math.round(nonzero.reduce((s,v)=>s+v,0)/nonzero.length):0;
      const t=trend(wvals);
      tbody+=`<tr><td style="font-weight:600;font-size:13px">${esc(name)}</td>`;
      wvals.forEach((v,idx)=>{ tbody+=`<td style="text-align:right;font-weight:${idx===0?"700":"400"};color:${idx===0&&v>0?"var(--scarlet)":"var(--text)"}">${v||"—"}</td>`; });
      tbody+=`<td style="text-align:right;color:var(--text2)">${avg||"—"}</td>
        <td style="text-align:center;font-size:18px;font-weight:700;color:${trendClr(t)}">${t}</td></tr>`;
    });

    // Total row
    const totals=showWeeks.map(w=>facNames.reduce((s,n)=>s+(data[n][fac]?.[w]||0),0));
    const totNonzero=totals.filter(v=>v>0);
    const totAvg=totNonzero.length?Math.round(totNonzero.reduce((s,v)=>s+v,0)/totNonzero.length):0;
    tbody+=`<tr style="border-top:2px solid var(--border);background:var(--bg2)"><td style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text3)">Total</td>`;
    totals.forEach((v,idx)=>{ tbody+=`<td style="text-align:right;font-weight:700;color:${idx===0?"var(--scarlet)":"var(--text)"}">${v||"—"}</td>`; });
    tbody+=`<td style="text-align:right;font-weight:700;color:var(--text2)">${totAvg||"—"}</td><td></td></tr>`;

    const icon=fac==="APC/JMA"?"🏋️":"🏟️";
    h+=`<div class="card" style="margin-bottom:16px">
      <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">${icon} ${fac}</div>
      <div class="tw"><table>${thead}<tbody>${tbody}</tbody></table></div>
    </div>`;
  });

  app.innerHTML=h;
}
