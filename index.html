function renderSnackExp(app){
  const arr=snackItems(), now=new Date();
  const withD=arr.filter(i=>i.expDate), noD=arr.filter(i=>!i.expDate);
  const bkts={};
  withD.forEach(i=>{ const d=new Date(i.expDate),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; (bkts[k]=bkts[k]||[]).push(i); });
  const keys=Object.keys(bkts).sort();
  function sUrgency(k){ const[y,m]=k.split("-"),me=new Date(+y,+m,0); if(me<now)return"past"; const ms=new Date(+y,+m-1,1); if(ms.getFullYear()===now.getFullYear()&&ms.getMonth()===now.getMonth())return"cur"; const nxt=new Date(now.getFullYear(),now.getMonth()+1,1); if(ms>=nxt&&ms<new Date(now.getFullYear(),now.getMonth()+2,1))return"next"; return"future"; }
  const US={past:{b:"var(--red)",h:"var(--red)",bg:"var(--red-bg)",ic:"🚫"},cur:{b:"var(--yellow)",h:"var(--yellow)",bg:"var(--yellow-bg)",ic:"⚠️"},next:{b:"var(--yellow)",h:"var(--yellow)",bg:"var(--yellow-bg)",ic:"⏳"},future:{b:"var(--border)",h:"var(--text2)",bg:"var(--bg2)",ic:"🗓️"}};
  function sMlabel(k){ const[y,m]=k.split("-"); return new Date(+y,+m-1,1).toLocaleString("default",{month:"long",year:"numeric"}); }
  const expC=withD.filter(i=>new Date(i.expDate)<now).length;
  const n30=withD.filter(i=>{ const d=days(i.expDate); return d!==null&&d>=0&&d<=30; }).length;
  function sIrow(i){
    const d=days(i.expDate);
    const urgClr=d===null?"var(--text3)":d<=0?"var(--red)":d<=30?"var(--yellow)":"var(--text2)";
    const urgLbl=d===null?"":d<=0?" · EXPIRED":` · ${d}d left`;
    return `<div class="arow">
      <div class="arow-info"><div class="arow-name">${esc(i.name)}</div><div class="arow-sub">${esc(i.location)} · ${esc(i.category||"—")}</div></div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700;color:${urgClr}">${i.expDate||"—"}${urgLbl}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">Qty: ${i.qty}</div>
      </div></div>`;
  }
  let h=`<div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="sc"><div class="sc-lbl">With Date</div><div class="sc-val">${withD.length}</div></div>
    <div class="sc"><div class="sc-lbl">Expired</div><div class="sc-val ${expC>0?"r":""}">${expC}</div></div>
    <div class="sc"><div class="sc-lbl">Next 30 Days</div><div class="sc-val ${n30>0?"y":""}">${n30}</div></div>
  </div>`;
  if(!keys.length&&!noD.length){ h+=`<div class="card"><div class="empty"><div class="empty-icon">🗓️</div>No expiration dates set yet.</div></div>`; app.innerHTML=h; return; }
  keys.forEach(k=>{ const u=sUrgency(k),s=US[u],its=bkts[k].slice().sort((a,b)=>new Date(a.expDate)-new Date(b.expDate)); h+=`<div class="card ecal" style="border-left-color:${s.b}"><div class="sec-hdr" style="color:${s.h};background:${s.bg};display:flex;justify-content:space-between;align-items:center"><span>${s.ic} ${sMlabel(k)}</span><span style="font-size:12px;opacity:.8">${its.length} item${its.length!==1?"s":""}</span></div>${its.map(sIrow).join("")}</div>`; });
  if(noD.length){ h+=`<div class="card" style="opacity:.75"><div class="sec-hdr" style="color:var(--text3);display:flex;justify-content:space-between"><span>📦 No Expiration Date</span><span style="font-size:12px">${noD.length} item${noD.length!==1?"s":""}</span></div>${noD.sort((a,b)=>a.name.localeCompare(b.name)).map(sIrow).join("")}</div>`; }
  app.innerHTML=h;
}

function getFacility(location){
  const APC_JMA=["APC Storage","APC Weight Room","APC Loading Dock","APC 3rd Floor","JMA Rowing Side","JMA Weight Room Side"];
  return APC_JMA.includes(location)?"APC/JMA":"Rodkin";
}

function isoWeek(ts){
  const d=new Date(ts); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const yr=d.getFullYear();
  const wk=Math.ceil((((d-new Date(yr,0,1))/86400000)+1)/7);
  return `${yr}-W${String(wk).padStart(2,"0")}`;
}

function weekLabel(isoW){
  const[yr,wStr]=isoW.split("-W"); const wn=parseInt(wStr);
  const jan4=new Date(+yr,0,4);
  const mon=new Date(jan4.getTime()+(wn-1)*7*86400000-(jan4.getDay()||7-1)*86400000);
  const sun=new Date(mon.getTime()+6*86400000);
  const fmt=d=>d.toLocaleDateString("default",{month:"short",day:"numeric"});
  return `${fmt(mon)} – ${fmt(sun)}`;
}

function openDist(ii){
  const id=(window._ids||[])[ii]; if(!id) return;
  const item=DB[id]; if(!item) return;

  // Find all batches for this item at this location
  const batches = allItems().filter(i=>i.name===item.name && i.location===item.location)
    .sort((a,b)=>new Date(a.expDate||"9999")-new Date(b.expDate||"9999"));

  window._distId = batches[0]?.id || id;
  window._distType = "used";

  const batchSelect = batches.length > 1
    ? `<div class="fg"><label>Expiration Batch *</label>
        <select id="dist-batch" onchange="window._distId=this.value" style="font-size:15px;padding:12px 14px">
          ${batches.map(b=>`<option value="${b.id}">${b.expDate||"No date"} · ${b.qty||0} in stock</option>`).join("")}
        </select>
       </div>`
    : `<div style="font-size:13px;color:var(--text2);margin-bottom:12px">
        Expiration: <strong>${item.expDate||"No date"}</strong> · ${item.qty||0} in stock
       </div>`;

  showModal(`<div class="mhandle"></div><h2>📉 Log Distribution</h2>
    <div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:14px">
      <div style="font-weight:700;font-size:15px;margin-bottom:2px">${esc(item.name)}</div>
      <div style="font-size:13px;color:var(--text2)">${esc(item.location)}</div>
    </div>
    ${batchSelect}
    <div class="fg"><label>Quantity being removed *</label>
      <input id="dist-qty" type="number" min="1" value="1" inputmode="numeric">
    </div>
    <div class="fg"><label>Reason *</label>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:6px">
        <button id="dist-btn-used" onclick="distSelect('used')" style="
          display:flex;align-items:center;gap:12px;padding:14px;
          border-radius:var(--r);border:2px solid var(--scarlet);
          background:var(--scarlet);color:#fff;cursor:pointer;text-align:left;width:100%">
          <span style="font-size:20px">✅</span>
          <div>
            <div style="font-weight:700;font-size:14px">Put out / Distributed</div>
            <div style="font-size:12px;opacity:.85">Weight room, locker room, fueling station, etc.</div>
          </div>
        </button>
        <button id="dist-btn-waste" onclick="distSelect('waste')" style="
          display:flex;align-items:center;gap:12px;padding:14px;
          border-radius:var(--r);border:2px solid var(--border2);
          background:var(--bg);color:var(--text);cursor:pointer;text-align:left;width:100%">
          <span style="font-size:20px">🗑️</span>
          <div>
            <div style="font-weight:700;font-size:14px">Thrown out / Wasted</div>
            <div style="font-size:12px;color:var(--text2)">Expired, damaged, or otherwise unusable</div>
          </div>
        </button>
      </div>
    </div>
    <div class="macts">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" onclick="doDist()">Log & Deduct</button>
    </div>`);
}

function distSelect(type){
  window._distType = type;
  const usedBtn  = document.getElementById("dist-btn-used");
  const wasteBtn = document.getElementById("dist-btn-waste");
  if(usedBtn){
    usedBtn.style.background  = type==="used"?"var(--scarlet)":"var(--bg)";
    usedBtn.style.color       = type==="used"?"#fff":"var(--text)";
    usedBtn.style.borderColor = type==="used"?"var(--scarlet)":"var(--border2)";
  }
  if(wasteBtn){
    wasteBtn.style.background  = type==="waste"?"var(--red)":"var(--bg)";
    wasteBtn.style.color       = type==="waste"?"#fff":"var(--text)";
    wasteBtn.style.borderColor = type==="waste"?"var(--red)":"var(--border2)";
  }
}

async function doDist(){
  const id=window._distId; if(!id) return;
  const item=DB[id]; if(!item) return;
  const qty=Math.max(1,parseInt(document.getElementById("dist-qty")?.value)||1);
  const type=window._distType||"used";
  if(qty>(item.qty||0)){ alert(`Only ${item.qty||0} in stock — can't remove ${qty}.`); return; }
  const newQty=(item.qty||0)-qty;
  const who=localStorage.getItem("inv_display_name")||(currentUser?.displayName||currentUser?.email||"Unknown");
  const now=Date.now();
  const week=isoWeek(now);
  const fac=getFacility(item.location);
  const price=item.price||0;
  const priceType=item.priceType||"unit";
  const value=price*qty;
  silentClose();
  DB[id].qty=newQty;
  await update(ref(db,`items/${id}`),{qty:newQty});
  await set(push(ref(db,"usage")),{
    name:item.name, qty, type, facility:fac, location:item.location,
    week, ts:now, who, date:new Date(now).toLocaleDateString(),
    price, priceType, value
  });
  await fLog(`${type==="used"?"Distributed":"Wasted"} ${qty} of "${item.name}" from ${item.location} → ${newQty} remaining${value>0?" · "+fmtPrice(value)+" value":""}`);
  render();
}

let _trkRange="4w";
let _trkShow="used";
let _trkMonth=null;

function setTrkRange(v){ _trkRange=v; render(); }
function setTrkShow(v){  _trkShow=v;  render(); }
function setTrkMonth(v){ _trkMonth=v; render(); }

async function deleteUsage(idsEncoded, name){
  const ids = JSON.parse(decodeURIComponent(idsEncoded));
  if(!ids.length) return;
  if(!confirm(`Delete all usage entries for "${name}"?\n\nThis removes all logged data for this item. This cannot be undone.`)) return;
  for(const id of ids){
    await remove(ref(db,`usage/${id}`));
    delete USAGE[id];
  }
  render();
}

function renderTracker(app){
  const allEntries = Object.entries(USAGE); // [id, entry]
  const now = Date.now();
  const thisWeek = isoWeek(now);

  function prevWeek(isoW, n){
    const[yr,wStr]=isoW.split("-W"); let wn=parseInt(wStr)-n;
    let y=+yr;
    while(wn<1){ wn+=52; y--; }
    return `${y}-W${String(wn).padStart(2,"0")}`;
  }
  const last4Weeks = [thisWeek, prevWeek(thisWeek,1), prevWeek(thisWeek,2), prevWeek(thisWeek,3)];

  // Show filter (Distributed / Wasted / Both)
  const showBtn=(v,lbl)=>`<button onclick="setTrkShow('${v}')" style="padding:6px 14px;border-radius:var(--r);border:1px solid ${_trkShow===v?"var(--scarlet)":"var(--border2)"};background:${_trkShow===v?"var(--scarlet)":"var(--bg)"};color:${_trkShow===v?"#fff":"var(--text2)"};font-size:12px;font-weight:600;cursor:pointer">${lbl}</button>`;

  let h=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div style="font-size:13px;color:var(--text2)">Showing <strong>This Week</strong> usage and <strong>4-Week Average</strong>.</div>
    <div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px">Show</div>
      <div style="display:flex;gap:6px">${showBtn("used","Distributed")}${showBtn("waste","Wasted")}${showBtn("both","Both")}</div>
    </div>
  </div>`;

  // Filter entries by show type
  const filtered = allEntries.filter(([,e])=>_trkShow==="both"||e.type===_trkShow);
  const names = [...new Set(filtered.map(([,e])=>e.name))].sort();

  if(!names.length){
    h+=`<div class="card"><div class="empty"><div class="empty-icon">📊</div>No data yet.<br><div style="font-size:13px;margin-top:8px;color:var(--text3)">Use the 📉 button on inventory items to log distributions.</div></div></div>`;
    app.innerHTML=h; return;
  }

  // Build wasted value section (only when showing waste or both)
  const wasteEntries = allEntries.filter(([,e])=>e.type==="waste");
  const thisWkWaste  = wasteEntries.filter(([,e])=>(e.week||isoWeek(e.ts))===thisWeek);

  if((_trkShow==="waste"||_trkShow==="both") && wasteEntries.length){
    // Calculate value lost by looking up current price from DB
    function wasteValue(entries){
      return entries.reduce(([,e],acc)=>{
        const item = Object.values(DB).find(i=>i.name===e.name);
        if(!item||!item.price) return acc;
        return acc + (item.price * (e.qty||0));
      }, 0);
    }
    // Simpler approach — iterate
    let totalWasteValue = 0, thisWkWasteValue = 0;
    const wasteByFac = {"APC/JMA":{total:0,thisWk:0}, "Rodkin":{total:0,thisWk:0}};
    wasteEntries.forEach(([,e])=>{
      const item = Object.values(DB).find(i=>i.name===e.name);
      if(!item||!item.price) return;
      const val = item.price * (e.qty||0);
      const fac = e.facility||getFacility(e.location||"");
      totalWasteValue += val;
      wasteByFac[fac] = wasteByFac[fac]||{total:0,thisWk:0};
      wasteByFac[fac].total += val;
      const isThisWk = (e.week||isoWeek(e.ts))===thisWeek;
      if(isThisWk){ thisWkWasteValue+=val; wasteByFac[fac].thisWk+=val; }
    });

    if(totalWasteValue>0){
      let wasteRows="";
      ["APC/JMA","Rodkin"].forEach(fac=>{
        const fw=wasteByFac[fac]||{total:0,thisWk:0};
        if(!fw.total) return;
        wasteRows+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:13px">${fac==="APC/JMA"?"🏋️":"🏟️"} ${fac}</div>
          <div style="text-align:right">
            <div style="font-weight:700;font-size:14px;color:var(--red)">${fmtPrice(fw.total)} total lost</div>
            ${fw.thisWk>0?`<div style="font-size:12px;color:var(--text3)">This week: ${fmtPrice(fw.thisWk)}</div>`:""}
          </div>
        </div>`;
      });
      h+=`<div class="card" style="margin-bottom:16px;border:1px solid var(--red)">
        <div style="padding:12px 16px;background:var(--red-bg);border-bottom:2px solid var(--red);display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800;font-size:13px;color:var(--red);text-transform:uppercase;letter-spacing:.5px">💸 Total Value Wasted</div>
          <div style="font-weight:800;font-size:16px;color:var(--red)">${fmtPrice(totalWasteValue)}</div>
        </div>
        ${wasteRows}
      </div>`;
    }
  }
  const data={};
  filtered.forEach(([id,e])=>{
    if(!data[e.name]) data[e.name]={};
    const fac=e.facility||getFacility(e.location||"");
    if(!data[e.name][fac]) data[e.name][fac]={};
    const wk=e.week||isoWeek(e.ts);
    if(!data[e.name][fac][wk]) data[e.name][fac][wk]={qty:0,ids:[]};
    data[e.name][fac][wk].qty+=e.qty;
    data[e.name][fac][wk].ids.push(id);
  });

  ["APC/JMA","Rodkin"].forEach(fac=>{
    const facNames=names.filter(n=>data[n]?.[fac]);
    if(!facNames.length) return;

    let thead=`<tr style="border-bottom:2px solid var(--border)">
      <th style="min-width:140px;padding:10px 14px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Item</th>
      <th style="text-align:right;min-width:90px;padding:10px 14px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">This Week</th>
      <th style="text-align:right;min-width:80px;padding:10px 14px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">1-Wk Avg</th>
      <th style="text-align:right;min-width:80px;padding:10px 14px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">4-Wk Avg</th>
      <th style="width:40px"></th>
    </tr>`;

    let tbody="";
    facNames.forEach(name=>{
      const fd=data[name][fac]||{};
      const thisWkQty=(fd[thisWeek]?.qty)||0;
      const allVals=last4Weeks.map(w=>fd[w]?.qty||0);
      const oneWkVals=[prevWeek(thisWeek,1)].map(w=>fd[w]?.qty||0);
      const oneWkNz=oneWkVals.filter(v=>v>0);
      const oneWkAvg=oneWkNz.length?(oneWkNz.reduce((s,v)=>s+v,0)/oneWkNz.length).toFixed(1):null;
      const nonzero=allVals.filter(v=>v>0);
      const avg=nonzero.length?(nonzero.reduce((s,v)=>s+v,0)/nonzero.length).toFixed(1):null;
      const allIds=Object.values(fd).flatMap(w=>w.ids||[]);
      const idsEncoded=encodeURIComponent(JSON.stringify(allIds));
      tbody+=`<tr style="border-bottom:1px solid var(--border)">
        <td style="font-weight:600;font-size:13px;padding:10px 14px">${esc(name)}</td>
        <td style="text-align:right;font-weight:700;padding:10px 14px;color:${thisWkQty>0?"var(--scarlet)":"var(--text)"}">${thisWkQty||"—"}</td>
        <td style="text-align:right;color:var(--text2);padding:10px 14px">${oneWkAvg||"—"}</td>
        <td style="text-align:right;color:var(--text2);padding:10px 14px">${avg||"—"}</td>
        <td style="text-align:center;padding:6px"><button class="ab" title="Delete" onclick="deleteUsage('${idsEncoded}','${esc(name)}')">🗑️</button></td>
      </tr>`;
    });

    // Total row + wasted value if showing waste
    const thisWkTotal=facNames.reduce((s,n)=>(s+(data[n][fac]?.[thisWeek]?.qty||0)),0);
    const oneWkTotalAvg=facNames.reduce((s,n)=>{
      const v=data[n][fac]?.[prevWeek(thisWeek,1)]?.qty||0;
      return s+v;
    },0);
    const avgTotal=facNames.reduce((s,n)=>{
      const vals=last4Weeks.map(w=>data[n][fac]?.[w]?.qty||0);
      const nz=vals.filter(v=>v>0);
      return s+(nz.length?nz.reduce((a,v)=>a+v,0)/nz.length:0);
    },0);

    // Wasted value for this week
    const wasteValue = (_trkShow==="waste"||_trkShow==="both")
      ? filtered.filter(([,e])=>e.type==="waste"&&(e.facility||getFacility(e.location||""))===fac&&(e.week||isoWeek(e.ts))===thisWeek)
          .reduce((s,[,e])=>s+(e.value||0),0)
      : 0;

    tbody+=`<tr style="border-top:2px solid var(--border);background:var(--bg2)">
      <td style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);padding:10px 14px">Total</td>
      <td style="text-align:right;font-weight:700;color:var(--scarlet);padding:10px 14px">${thisWkTotal||"—"}</td>
      <td style="text-align:right;font-weight:700;color:var(--text2);padding:10px 14px">${oneWkTotalAvg||"—"}</td>
      <td style="text-align:right;font-weight:700;color:var(--text2);padding:10px 14px">${avgTotal>0?avgTotal.toFixed(1):"—"}</td>
      <td></td>
    </tr>`;
    if(wasteValue>0){
      tbody+=`<tr style="background:var(--red-bg)">
        <td colspan="5" style="padding:8px 14px;font-size:12px;color:var(--red);font-weight:700">
          💸 Value wasted this week: ${fmtPrice(wasteValue)}
        </td>
      </tr>`;
    }

      const icon=fac==="APC/JMA"?"🏋️":"🏟️";
      h+=`<div class="card" style="margin-bottom:16px">
        <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">${icon} ${fac}</div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;border-collapse:collapse">${thead}<tbody>${tbody}</tbody></table></div>
      </div>`;
  });

  // ── Monthly Summary Section ──
  // Build list of all months that have data
  const allMonths = [...new Set(
    Object.values(USAGE).map(e=>{
      const d = new Date(e.ts);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    })
  )].sort().reverse();

  // Generate all months from earliest data to now for the selector
  const nowDate = new Date();
  const allSelectMonths = [];
  if(allMonths.length){
    const earliest = allMonths[allMonths.length-1];
    let [ey,em] = earliest.split("-").map(Number);
    const cy = nowDate.getFullYear(), cm = nowDate.getMonth()+1;
    while(ey < cy || (ey===cy && em<=cm)){
      allSelectMonths.push(`${ey}-${String(em).padStart(2,"0")}`);
      em++; if(em>12){ em=1; ey++; }
    }
    allSelectMonths.reverse();
  } else {
    // No data yet — just show current month
    allSelectMonths.push(`${nowDate.getFullYear()}-${String(nowDate.getMonth()+1).padStart(2,"0")}`);
  }

  if(!_trkMonth || !allSelectMonths.includes(_trkMonth)) _trkMonth = allSelectMonths[0];

  function mLabel(ym){ const[y,m]=ym.split("-"); return new Date(+y,+m-1,1).toLocaleString("default",{month:"long",year:"numeric"}); }

  const monthSelector = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div style="font-weight:700;font-size:15px">📅 Monthly Summary</div>
    <select onchange="setTrkMonth(this.value)" style="padding:8px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--bg);color:var(--text);cursor:pointer">
      ${allSelectMonths.map(m=>`<option value="${m}" ${m===_trkMonth?"selected":""}>${mLabel(m)}</option>`).join("")}
    </select>
  </div>`;

  // Filter usage entries for selected month
  const monthEntries = Object.entries(USAGE).filter(([,e])=>{
    const d=new Date(e.ts);
    const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    return ym===_trkMonth && (_trkShow==="both"||e.type===_trkShow);
  });

  // Get weeks in this month
  const monthWeekSet = new Set(monthEntries.map(([,e])=>e.week||isoWeek(e.ts)));
  const monthWeeks = [...monthWeekSet].sort();
  const weekCount = monthWeeks.length || 1;

  // Build monthly data[name][fac] = {total, byWeek:{week:qty}}
  const mData={};
  monthEntries.forEach(([id,e])=>{
    if(!mData[e.name]) mData[e.name]={};
    const fac=e.facility||getFacility(e.location||"");
    if(!mData[e.name][fac]) mData[e.name][fac]={total:0,byWeek:{}};
    const wk=e.week||isoWeek(e.ts);
    mData[e.name][fac].total+=(e.qty||0);
    mData[e.name][fac].byWeek[wk]=(mData[e.name][fac].byWeek[wk]||0)+(e.qty||0);
  });

  let mSection = monthSelector;

  if(!monthEntries.length){
    mSection+=`<div class="card"><div class="empty"><div class="empty-icon">📅</div>No distribution data for ${mLabel(_trkMonth)}.</div></div>`;
  } else {
    ["APC/JMA","Rodkin"].forEach(fac=>{
      const facNames=Object.keys(mData).filter(n=>mData[n][fac]).sort();
      if(!facNames.length) return;

      let thead=`<tr>
        <th style="min-width:160px">Item</th>
        <th style="text-align:right;min-width:90px">Total</th>
        <th style="text-align:right;min-width:90px">Wkly Avg</th>
      </tr>`;

      let tbody="";
      let grandTotal=0;
      facNames.forEach(name=>{
        const fd=mData[name][fac];
        const total=fd.total||0;
        const wkAvg=(total/weekCount).toFixed(1);
        grandTotal+=total;
        tbody+=`<tr>
          <td style="font-weight:600;font-size:13px">${esc(name)}</td>
          <td style="text-align:right;font-weight:700;color:var(--scarlet)">${total}</td>
          <td style="text-align:right;color:var(--text2)">${wkAvg}</td>
        </tr>`;
      });
      tbody+=`<tr style="border-top:2px solid var(--border);background:var(--bg2)">
        <td style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text3)">Total</td>
        <td style="text-align:right;font-weight:700;color:var(--scarlet)">${grandTotal}</td>
        <td style="text-align:right;font-weight:700;color:var(--text2)">${(grandTotal/weekCount).toFixed(1)}</td>
      </tr>`;

      const icon=fac==="APC/JMA"?"🏋️":"🏟️";
      mSection+=`<div class="card" style="margin-bottom:16px">
        <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">${icon} ${fac}</div>
        <div style="padding:8px 16px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border)">${weekCount} week${weekCount!==1?"s":""} of data · ${mLabel(_trkMonth)}</div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;border-collapse:collapse">${thead}<tbody>${tbody}</tbody></table></div>
      </div>`;
    });
  }

  h += `<div style="margin-top:24px;border-top:2px solid var(--border);padding-top:20px">${mSection}</div>`;
  app.innerHTML=h;
}

function openCheckIn(){
  const who = localStorage.getItem("inv_display_name")||(currentUser?.displayName||currentUser?.email||"Unknown");
  showModal(`<div class="mhandle"></div><h2>📋 Log Inventory Check</h2>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Record that you've checked and counted inventory at a location.</div>
    <div class="fg"><label>Location *</label>
      <select id="chk-loc">
        ${SLOCS.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join("")}
      </select>
    </div>
    <div class="fg"><label>Your Name</label>
      <input id="chk-who" value="${esc(who)}" placeholder="Your name">
    </div>
    <div class="fg"><label>Notes (optional)</label>
      <input id="chk-notes" placeholder="e.g. Restocked bananas, low on protein bars">
    </div>
    <div class="macts">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" onclick="doCheckIn()">Log Check-In</button>
    </div>`);
}

async function doCheckIn(){
  const loc   = fvs("chk-loc");
  const who   = fv("chk-who")||localStorage.getItem("inv_display_name")||(currentUser?.displayName||"Unknown");
  const notes = fv("chk-notes");
  if(!loc){ alert("Please select a location."); return; }
  silentClose();
  const now = Date.now();
  await set(push(ref(db,"checkins")),{
    location: loc,
    who,
    notes,
    ts:   now,
    date: new Date(now).toLocaleDateString(),
    time: new Date(now).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
  });
  await fLog(`[Check-In] ${who} checked inventory at ${loc}${notes?" — "+notes:""}`);
  render();
}

function renderCheckIn(app){
  const entries = Object.values(CHECKINS).sort((a,b)=>(b.ts||0)-(a.ts||0));

  // Group by location — show most recent check per location
  const byLoc = {};
  entries.forEach(e=>{ if(!byLoc[e.location]) byLoc[e.location]=e; });

  // Recent activity log
  const recent = entries.slice(0,50);

  let h=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-size:13px;color:var(--text2)">Log when you've checked inventory at a location.</div>
    <button class="btn p" onclick="openCheckIn()" style="white-space:nowrap">📋 Log Check-In</button>
  </div>

  <!-- Last check per location -->
  <div class="card" style="margin-bottom:16px">
    <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">
      Last Check by Location
    </div>`;

  if(!Object.keys(byLoc).length){
    h+=`<div class="empty" style="padding:30px"><div class="empty-icon">📋</div>No check-ins yet.</div>`;
  } else {
    SLOCS.forEach(loc=>{
      const last = byLoc[loc];
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:700;font-size:13px">${esc(loc)}</div>
          ${last
            ?`<div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(last.who)} · ${last.date} at ${last.time}${last.notes?` · ${esc(last.notes)}`:""}</div>`
            :`<div style="font-size:12px;color:var(--text3);margin-top:2px">Never checked</div>`}
        </div>
        ${last
          ?`<span style="font-size:11px;color:var(--text3);white-space:nowrap;margin-left:12px">${timeSince(last.ts)}</span>`
          :`<span style="font-size:11px;color:var(--red);white-space:nowrap;margin-left:12px">⚠️ None</span>`}
      </div>`;
    });
  }
  h+=`</div>

  <!-- Recent activity -->
  <div class="card">
    <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">
      Recent Check-Ins
    </div>`;

  if(!recent.length){
    h+=`<div class="empty" style="padding:24px"><div class="empty-icon">📋</div>No check-ins logged yet.</div>`;
  } else {
    recent.forEach(e=>{
      h+=`<div class="alog"><div class="alog-dot"></div><div class="alog-body">
        <div class="alog-msg"><strong>${esc(e.who)}</strong> checked <strong>${esc(e.location)}</strong>${e.notes?` — ${esc(e.notes)}`:""}</div>
        <div class="alog-time">${e.date} at ${e.time} · ${timeSince(e.ts)}</div>
      </div></div>`;
    });
  }
  h+=`</div>`;
  app.innerHTML=h;
}

function timeSince(ts){
  const diff = Date.now()-ts;
  const mins = Math.floor(diff/60000);
  const hrs  = Math.floor(diff/3600000);
  const days2= Math.floor(diff/86400000);
  if(mins<1)   return "just now";
  if(mins<60)  return `${mins}m ago`;
  if(hrs<24)   return `${hrs}h ago`;
  if(days2<7)  return `${days2}d ago`;
  return `${Math.floor(days2/7)}w ago`;
}

function openAddOrder(){
  showModal(`<div class="mhandle"></div><h2>🛒 Add Incoming Order</h2>
    <div class="fg"><label>Item Name *</label>
      <input id="ord-name" list="ord-names-list" placeholder="e.g. Chocolate Gatorade Shake" autofocus>
      <datalist id="ord-names-list">
        ${[...new Set(allItems().map(i=>i.name))].sort().map(n=>`<option value="${esc(n)}">`).join("")}
      </datalist>
    </div>
    <div class="frow">
      <div class="fg"><label>Quantity *</label>
        <input id="ord-qty" type="number" min="1" value="1" inputmode="numeric">
      </div>
      <div class="fg"><label>Expected Delivery *</label>
        <input id="ord-date" type="date">
      </div>
    </div>
    <div class="fg"><label>Notes (optional)</label>
      <input id="ord-notes" placeholder="e.g. Vendor, PO number, etc.">
    </div>
    <div class="macts">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" onclick="doAddOrder()">Add Order</button>
    </div>`);
  // Default delivery date to 1 week from today
  const d = new Date(); d.setDate(d.getDate()+7);
  const el = document.getElementById("ord-date");
  if(el) el.value = d.toISOString().slice(0,10);
}

async function doAddOrder(){
  const name  = fv("ord-name");
  const qty   = Math.max(1, parseInt(document.getElementById("ord-qty")?.value)||1);
  const date  = fv("ord-date");
  const notes = fv("ord-notes");
  if(!name){ alert("Item name is required."); return; }
  if(!date){ alert("Expected delivery date is required."); return; }
  silentClose();
  const who = localStorage.getItem("inv_display_name")||(currentUser?.displayName||currentUser?.email||"Unknown");
  await set(push(ref(db,"orders")),{
    name, qty, date, notes,
    status: "pending",   // "pending" | "received"
    ts:     Date.now(),
    who
  });
  await fLog(`Order placed: ${qty}× "${name}" — expected ${date}`);
  render();
}

async function markOrderReceived(id){
  const o = ORDERS[id]; if(!o) return;
  if(!confirm(`Mark "${o.name}" (${o.qty} units) as received?\n\nInventory will NOT be updated automatically — add the stock manually to the correct location.`)) return;
  await update(ref(db,`orders/${id}`),{ status:"received", receivedTs:Date.now() });
  ORDERS[id] = {...o, status:"received", receivedTs:Date.now()};
  await fLog(`Order received: ${o.qty}× "${o.name}"`);
  render();
}

async function deleteOrder(id){
  const o = ORDERS[id]; if(!o) return;
  if(!confirm(`Delete order for "${o.name}"?\n\nThis cannot be undone.`)) return;
  await remove(ref(db,`orders/${id}`));
  delete ORDERS[id];
  render();
}

function renderOrders(app){
  const entries = Object.entries(ORDERS).map(([id,o])=>({...o,id}));
  const pending  = entries.filter(o=>o.status!=="received")
    .sort((a,b)=>a.date<b.date?-1:1);
  const received = entries.filter(o=>o.status==="received")
    .sort((a,b)=>(b.receivedTs||0)-(a.receivedTs||0));

  const today = new Date().toISOString().slice(0,10);

  // Stats
  const overdue   = pending.filter(o=>o.date<today).length;
  const thisWeekD = new Date(); thisWeekD.setDate(thisWeekD.getDate()+7);
  const arriving  = pending.filter(o=>o.date>=today&&o.date<=thisWeekD.toISOString().slice(0,10)).length;
  const totalQty  = pending.reduce((s,o)=>s+(o.qty||0),0);

  let h=`
  <div class="stats">
    <div class="sc"><div class="sc-lbl">Pending Orders</div><div class="sc-val">${pending.length}</div></div>
    <div class="sc"><div class="sc-lbl">Arriving This Week</div><div class="sc-val ${arriving>0?"y":""}">${arriving}</div></div>
    <div class="sc"><div class="sc-lbl">Overdue</div><div class="sc-val ${overdue>0?"r":""}">${overdue}</div></div>
    <div class="sc"><div class="sc-lbl">Total Units Incoming</div><div class="sc-val">${totalQty}</div></div>
  </div>

  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn p" onclick="openAddOrder()">+ Add Order</button>
  </div>`;

  // Pending orders
  h+=`<div class="card" style="margin-bottom:16px">
    <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">
      🛒 Pending Orders
    </div>`;

  if(!pending.length){
    h+=`<div class="empty" style="padding:30px"><div class="empty-icon">🛒</div>No pending orders.</div>`;
  } else {
    pending.forEach(o=>{
      const isOverdue = o.date < today;
      const isToday   = o.date === today;
      const dateClr   = isOverdue?"var(--red)":isToday?"var(--yellow)":"var(--text)";
      const dateLbl   = isOverdue?" · OVERDUE":isToday?" · Today":"";

      // How many currently in stock
      const inStock = allItems().filter(i=>i.name.toLowerCase().trim()===o.name.toLowerCase().trim())
        .reduce((s,i)=>s+(i.qty||0),0);

      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px">
        <div style="min-width:0;flex:1">
          <div style="font-weight:700;font-size:14px;margin-bottom:3px">${esc(o.name)}</div>
          <div style="font-size:12px;color:var(--text2)">
            ${o.qty} units incoming
            <span style="margin:0 6px;color:var(--border2)">·</span>
            <span style="color:var(--text3)">${inStock} currently in stock</span>
            ${o.notes?`<span style="margin:0 6px;color:var(--border2)">·</span><span style="color:var(--text3)">${esc(o.notes)}</span>`:""}
          </div>
          <div style="font-size:12px;font-weight:700;color:${dateClr};margin-top:4px">
            📅 Expected: ${o.date}${dateLbl}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn sm" style="background:var(--scarlet);color:#fff;border-color:var(--scarlet)" onclick="markOrderReceived('${o.id}')">✓ Received</button>
          <button class="ab" onclick="deleteOrder('${o.id}')">🗑️</button>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;

  // Received orders
  if(received.length){
    h+=`<div class="card">
      <div style="padding:12px 16px;background:var(--black);color:#fff;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--scarlet)">
        ✅ Recently Received
      </div>`;
    received.slice(0,10).forEach(o=>{
      const recDate = o.receivedTs ? new Date(o.receivedTs).toLocaleDateString() : "—";
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);opacity:.8">
        <div>
          <div style="font-weight:600;font-size:13px;color:var(--text2)">${esc(o.name)}</div>
          <div style="font-size:12px;color:var(--text3)">${o.qty} units · Received ${recDate}</div>
        </div>
        <button class="ab" onclick="deleteOrder('${o.id}')">🗑️</button>
      </div>`;
    });
    h+=`</div>`;
  }

  app.innerHTML=h;
}
