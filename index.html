<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventory Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Rutgers palette */
  --scarlet:#CC0033;
  --scarlet-dark:#9e0026;
  --scarlet-bg:#fff0f3;
  --scarlet-bdr:#f5b8c4;
  --black:#0a0a0a;
  --grey-dark:#1c1c1c;
  --grey-mid:#2e2e2e;
  --grey:#888888;
  --grey-light:#e8e8e8;

  --bg:#ffffff;
  --bg2:#f7f7f7;
  --bg3:#f0f0f0;
  --text:#0a0a0a;
  --text2:#555555;
  --text3:#999999;
  --border:#e0e0e0;
  --border2:#cccccc;

  /* Accent = scarlet */
  --blue-bg:var(--scarlet-bg);
  --blue:var(--scarlet);
  --blue-bdr:var(--scarlet-bdr);

  /* Status colors */
  --green-bg:#eaf5ea;--green:#236b23;
  --yellow-bg:#fff8e6;--yellow:#8a5c00;
  --red-bg:#fff0f3;--red:#cc0033;

  --r:6px;--rl:10px;--th:60px;--bnh:62px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 4px 24px rgba(0,0,0,.13);
}

/* ── Force dark mode off — Rutgers is light ── */
html,body{
  height:100%;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg3);
  color:var(--text);
  font-size:14px;
}

/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--th);
  background:var(--black);
  border-bottom:3px solid var(--scarlet);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
  box-shadow:0 2px 16px rgba(0,0,0,.4);
}
.t-title{
  font-size:18px;font-weight:800;
  color:#ffffff;
  letter-spacing:.5px;
  text-transform:uppercase;
}
.t-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:4px 10px;
  font-size:11px;color:rgba(255,255,255,.7);
}
.sdot{width:7px;height:7px;border-radius:50%;background:#666;transition:background .3s}
.sdot.live{background:#4caf50}.sdot.err{background:#ff5252}

/* Desktop nav */
.dnav{display:flex;gap:2px}
.dnav button{
  padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;
  cursor:pointer;background:transparent;border:1px solid transparent;
  color:rgba(255,255,255,.65);transition:all .15s;white-space:nowrap;
  text-transform:uppercase;letter-spacing:.3px;
}
.dnav button:hover{background:rgba(255,255,255,.1);color:#fff}
.dnav button.on{background:var(--scarlet);color:#fff;border-color:var(--scarlet-dark)}

/* Mobile bottom nav */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:var(--bnh);background:var(--black);
  border-top:2px solid var(--scarlet);
  display:none;align-items:stretch;
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;border:none;background:transparent;
  cursor:pointer;color:rgba(255,255,255,.5);font-size:10px;
  padding:6px 2px;transition:color .15s;font-weight:600;text-transform:uppercase;
}
.bnav-btn .ni{font-size:20px;line-height:1}
.bnav-btn.on{color:var(--scarlet)}

.page{padding-top:calc(var(--th) + 16px);padding-bottom:24px;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:0 20px}

/* ── Location tabs ── */
.tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{
  display:flex;gap:4px;
  background:var(--black);
  border-radius:var(--rl);
  padding:6px;width:max-content;min-width:100%;
  box-shadow:var(--shadow);
}
.tab{
  padding:8px 16px;border:1px solid transparent;
  border-radius:var(--r);font-size:12px;font-weight:700;
  cursor:pointer;background:transparent;
  color:rgba(255,255,255,.55);white-space:nowrap;
  transition:all .15s;text-transform:uppercase;letter-spacing:.4px;
}
.tab:hover{background:rgba(255,255,255,.1);color:#fff}
.tab.on{background:var(--scarlet);color:#fff;border-color:var(--scarlet-dark);box-shadow:0 2px 8px rgba(204,0,51,.4)}

/* ── Stats bar ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sc{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--rl);padding:16px 18px;
  box-shadow:var(--shadow);
  border-top:3px solid var(--border);
  transition:transform .15s;
}
.sc:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.sc-lbl{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.sc-val{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.sc-val.y{color:var(--yellow)}.sc-val.r{color:var(--scarlet)}
.stats .sc:first-child{border-top-color:var(--scarlet)}

/* ── Card ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.toolbar{padding:12px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2)}
.si{
  flex:1;min-width:120px;padding:9px 12px;
  border:1px solid var(--border2);border-radius:var(--r);
  font-size:14px;background:var(--bg);color:var(--text);
  transition:border-color .15s;
}
.si:focus{outline:none;border-color:var(--scarlet);box-shadow:0 0 0 3px rgba(204,0,51,.1)}
.fsel{
  padding:9px 10px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:13px;background:var(--bg);color:var(--text);cursor:pointer;
}
.fsel:focus{outline:none;border-color:var(--scarlet)}

/* ── Buttons ── */
.btn{
  padding:8px 18px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:13px;font-weight:600;cursor:pointer;
  background:var(--bg);color:var(--text);
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.97)}
.btn.p{background:var(--scarlet);color:#fff;border-color:var(--scarlet-dark);box-shadow:0 2px 8px rgba(204,0,51,.25)}
.btn.p:hover{background:var(--scarlet-dark);box-shadow:0 3px 12px rgba(204,0,51,.35)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.ic{padding:7px 9px;font-size:15px}
.ab{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:6px;font-size:14px;opacity:.5;transition:all .15s}
.ab:hover{opacity:1;background:var(--bg2)}

/* ── Table ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  background:var(--bg2);padding:11px 14px;text-align:left;
  font-weight:700;font-size:10px;color:var(--text3);
  border-bottom:2px solid var(--border);
  text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;
}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.qc{display:flex;align-items:center;gap:5px}
.qb{
  width:30px;height:30px;
  border:2px solid var(--border2);border-radius:6px;
  background:var(--bg);color:var(--text);
  cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .1s;font-weight:700;
}
.qb:hover{border-color:var(--scarlet);color:var(--scarlet);background:var(--scarlet-bg)}
.qb:active{transform:scale(.85)}
.qn{min-width:30px;text-align:center;font-weight:700;font-size:15px}

/* ── Badges ── */
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.badge.ok{background:#eaf5ea;color:#236b23}
.badge.low{background:#fff8e6;color:#8a5c00}
.badge.out{background:var(--scarlet-bg);color:var(--scarlet)}
.badge.exp{background:var(--scarlet-bg);color:var(--scarlet)}

/* ── Mobile cards ── */
.mcards{display:none;padding:10px}
.mcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.mcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.mcard-name{font-size:15px;font-weight:700;flex:1}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mf{font-size:12px}
.mf-l{color:var(--text3);display:block;margin-bottom:1px;text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.4px}
.mf-v{color:var(--text2);font-weight:500}
.mcard-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.mcard-acts{display:flex;gap:6px}

/* ── Empty state ── */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ── Modal ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:300;padding:0;backdrop-filter:blur(2px)}
.modal{background:var(--bg);border-radius:20px 20px 0 0;border-top:3px solid var(--scarlet);padding:24px 20px 36px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.mhandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal h2{font-size:18px;font-weight:800;margin-bottom:18px;text-transform:uppercase;letter-spacing:.3px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--r);font-size:16px;background:var(--bg2);color:var(--text);-webkit-appearance:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--scarlet);background:var(--bg);box-shadow:0 0 0 3px rgba(204,0,51,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.macts{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.macts .btn{flex:1;padding:13px;font-size:14px;text-align:center;text-transform:uppercase;letter-spacing:.3px}

/* ── Batch rows ── */
.brow{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:12px 14px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.brow-info{flex:1;font-size:13px}
.brow-loc{color:var(--scarlet);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.brow-exp{color:var(--text);font-weight:700}
.brow-sub{color:var(--text3);font-size:12px}
.brow input{width:72px;padding:8px 6px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);text-align:center;font-weight:700}
.brow input:focus{outline:none;border-color:var(--scarlet)}

/* ── Scan ── */
.scan-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:32px 16px;text-align:center;color:var(--text3);font-size:14px;margin-bottom:14px;cursor:pointer;transition:all .15s}
.scan-zone:hover{border-color:var(--scarlet);color:var(--scarlet);background:var(--scarlet-bg)}
.scan-res{padding:12px 14px;border-radius:var(--r);font-size:13px;min-height:40px;background:var(--bg2);color:var(--text2);font-weight:600}
.scan-res.ok{background:#eaf5ea;color:#236b23}
.scan-res.no{background:var(--scarlet-bg);color:var(--scarlet)}

/* ── Activity ── */
.alog{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.alog:last-child{border-bottom:none}
.alog-dot{width:8px;height:8px;border-radius:50%;background:var(--scarlet);flex-shrink:0;margin-top:4px}
.alog-body{flex:1}
.alog-msg{font-size:13px;color:var(--text);line-height:1.5;font-weight:500}
.alog-time{font-size:11px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

/* ── Alert sections ── */
.sec-hdr{padding:13px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.4px;background:var(--bg2)}
.arow{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.arow:last-child{border-bottom:none}
.arow-info{flex:1;min-width:0}
.arow-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arow-sub{font-size:12px;color:var(--text2);margin-top:2px}

/* ── Location breakdown ── */
.loc-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.loc-row-txt{flex:1;font-size:12px;line-height:1.5}

/* ── Expiry calendar ── */
.ecal{border-left:4px solid var(--border);margin-bottom:12px;border-radius:0 var(--rl) var(--rl) 0}
tr.drag-over td{background:var(--scarlet-bg)!important;outline:2px dashed var(--scarlet);outline-offset:-2px}
tr.dragging{opacity:.35}

/* ── Setup ── */
.setup-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--th));padding:20px;background:var(--bg3)}
.setup-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:32px 28px;width:100%;max-width:480px;box-shadow:var(--shadow-lg)}
.setup-card h2{font-size:22px;font-weight:800;margin-bottom:10px;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.setup-card p{color:var(--text2);font-size:14px;margin-bottom:20px;line-height:1.6;text-align:center}
.setup-err{color:var(--scarlet);font-size:13px;margin-top:10px;min-height:20px;text-align:center;font-weight:600}

/* ── Settings ── */
.scard{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;max-width:560px;box-shadow:var(--shadow)}
.scard-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;background:var(--bg2)}
.scard-body{padding:20px}

/* ── Spinner / FAB ── */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--scarlet);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.fab{
  display:none;position:fixed;right:18px;bottom:calc(var(--bnh) + 16px);z-index:99;
  width:56px;height:56px;border-radius:50%;
  background:var(--scarlet);color:#fff;border:none;
  font-size:28px;cursor:pointer;
  box-shadow:0 4px 20px rgba(204,0,51,.45);
  align-items:center;justify-content:center;
  font-weight:700;
}
.fab:active{transform:scale(.92)}

/* ── Responsive ── */
@media(max-width:700px){
  :root{--bnh:66px;--th:52px}

  /* Page spacing */
  .page{padding-top:calc(var(--th) + 12px);padding-bottom:calc(var(--bnh) + 16px)}
  .wrap{padding:0 10px}

  /* Topbar — slim on mobile */
  .topbar{padding:0 12px;gap:8px}
  .t-title{font-size:14px;letter-spacing:0}
  .t-title-long{display:none}
  /* Hide sync text label on mobile, keep just the dot */
  #slbl{display:none}
  .sync-pill{padding:4px 7px;gap:4px;min-width:unset}
  /* Hide user name text on mobile, keep photo + sign out only */
  #user-badge span{display:none}
  #user-badge img{width:28px;height:28px}

  /* Desktop nav hidden, bottom nav shown */
  .dnav{display:none}
  .bnav{display:flex}
  .fab{display:flex}

  /* Bottom nav polish */
  .bnav-btn{font-size:9px;letter-spacing:.2px;padding:6px 4px}
  .bnav-btn .ni{font-size:22px}

  /* Tables → cards */
  .tw table{display:none}
  .mcards{display:block}

  /* Stats — 2x2 tighter */
  .stats{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .sc{padding:12px 14px}
  .sc-lbl{font-size:9px}
  .sc-val{font-size:26px}

  /* Tabs */
  .tabs-wrap{margin-bottom:12px}
  .tabs{gap:3px;padding:5px}
  .tab{padding:8px 12px;font-size:10px;letter-spacing:.2px}

  /* Cards */
  .card{border-radius:var(--r);margin-bottom:12px}
  .mcards{padding:8px 0}
  .mcard{border-radius:var(--r);padding:14px;margin-bottom:8px}
  .mcard-name{font-size:15px}

  /* Toolbar */
  .toolbar{flex-direction:column;align-items:stretch;gap:8px;padding:10px}
  .si{min-width:unset;font-size:15px;padding:10px 12px}
  .fsel{font-size:14px;padding:10px}
  .donly{display:none}

  /* Form rows — stack on mobile */
  .frow{grid-template-columns:1fr}
  .fg input,.fg select{font-size:16px;padding:13px 14px}

  /* Modal — full width bottom sheet */
  .modal{padding:20px 16px 40px;border-radius:24px 24px 0 0}
  .modal h2{font-size:17px}
  .macts .btn{padding:15px;font-size:14px}

  /* Qty buttons — bigger touch targets */
  .qb{width:36px;height:36px;font-size:20px;border-radius:8px}
  .qn{font-size:16px;min-width:36px}

  /* Batch rows */
  .brow{padding:12px}
  .brow input{width:80px;padding:10px 6px;font-size:16px}

  /* Settings cards full width */
  .scard{max-width:100%}

  /* FAB safe area for home indicator */
  .fab{bottom:calc(var(--bnh) + 16px);right:16px;width:52px;height:52px;font-size:26px}
}

@media(min-width:701px){
  .mcards{display:none}
  .tw table{display:table}
  .bnav,.fab{display:none}
  .mbg{align-items:center;padding:20px}
  .modal{border-radius:var(--rl);border:1px solid var(--border);border-top:3px solid var(--scarlet);width:520px;max-width:100%}
  .mhandle{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="t-title">🏟️ <span class="t-title-long">Rutgers </span>Inventory</div>
  <div style="display:flex;align-items:center;background:rgba(255,255,255,.1);border-radius:8px;padding:3px;gap:2px;flex-shrink:0">
    <button id="mode-drinks" onclick="setMode('drinks')" style="padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;background:var(--scarlet);color:#fff;transition:all .15s">🥤 Gatorade</button>
    <button id="mode-snacks" onclick="setMode('snacks')" style="padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;background:transparent;color:rgba(255,255,255,.6);transition:all .15s">🍎 Snacks</button>
  </div>
  <div class="t-right">
    <div class="sync-pill">
      <span class="sdot" id="sdot"></span>
      <span id="slbl">Connecting…</span>
    </div>
    <div class="dnav">
      <button id="nav-inv" onclick="V('inv')">Inventory</button>
      <button id="nav-act" onclick="V('act')">Activity</button>
      <button id="nav-alr" onclick="V('alr')">⚠️ Alerts</button>
      <button id="nav-exp" onclick="V('exp')">🗓️ Expiration</button>
      <button id="nav-trk" onclick="V('trk')">📊 Tracker</button>
      <button id="nav-cfg" onclick="V('cfg')">⚙️</button>
    </div>
    <div id="user-badge" style="display:flex;align-items:center;gap:6px"></div>
  </div>
</div>

<div class="page"><div class="wrap" id="app">
  <div style="text-align:center;padding:60px;color:var(--text2)"><div class="spin"></div>Loading…</div>
</div></div>

<div class="bnav" id="bnav">
  <button class="bnav-btn" id="bnav-inv" onclick="V('inv')"><span class="ni">📦</span>Inventory</button>
  <button class="bnav-btn" id="bnav-act" onclick="V('act')"><span class="ni">📋</span>Activity</button>
  <button class="bnav-btn" id="bnav-alr" onclick="V('alr')"><span class="ni">⚠️</span>Alerts</button>
  <button class="bnav-btn" id="bnav-exp" onclick="V('exp')"><span class="ni">🗓️</span>Expiry</button>
  <button class="bnav-btn" id="bnav-trk" onclick="V('trk')"><span class="ni">📊</span>Tracker</button>
  <button class="bnav-btn" id="bnav-cfg" onclick="V('cfg')"><span class="ni">⚙️</span>Settings</button>
</div>
<button class="fab" id="fab" onclick="MODE==='snacks'?openSnackAdd():openAdd()">+</button>
<div id="mroot"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════ */
const LOCS = [
  "APC Storage","APC Weight Room","APC Loading Dock","APC 3rd Floor",
  "JMA Rowing Side","JMA Weight Room Side",
  "Rodkin Cabinets","Rodkin Loading Dock","Rodkin Storage Pod"
];
const CATS = [
  "Cleaning Supplies","Equipment","Medical/First Aid","Food & Beverage",
  "PPE","Office Supplies","Maintenance","Other"
];
const SLOCS = [
  "APC Fueling Station","Rodkin Fueling Station",
  "Men's Basketball","Women's Basketball","Gymnastics"
];
const SCATS = [
  "Bars & Snacks","Fresh Fruit","Fridge Items","Drinks",
  "Bread & Grains","Spreads & Dips","Other"
];
const CFG_KEY  = "inv_fb_cfg";
const DEF_LOW  = 5;

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let db         = null;
let auth       = null;
let currentUser = null;
let DB         = {};   // drinks data
let SDB        = {};   // snacks data
let LOGS       = [];
let USAGE      = {};   // usage tracking data
let modalOpen  = false;

const UI  = { view:"inv", tab:0, fStatus:"all", fCat:"all", search:"" };
const SUI = { tab:0, fCat:"all", search:"", sview:"inv" };
let MODE = "drinks"; // "drinks" | "snacks"

/* ════════════════════════════════════════════
   CONFIG / LOCAL STORAGE
════════════════════════════════════════════ */
function getCfg(){
  try{ return JSON.parse(localStorage.getItem(CFG_KEY)); }catch(e){ return null; }
}
function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }

/* ════════════════════════════════════════════
   FIREBASE INIT + AUTH
════════════════════════════════════════════ */
function initFB(cfg){
  try{
    const app = initializeApp(cfg);
    db   = getDatabase(app);
    auth = getAuth(app);
    onAuthStateChanged(auth, user=>{
      currentUser = user;
      if(!user){ showLogin(); return; }
      updateUserBadge(user);
      onValue(ref(db,"items"), snap=>{
        DB = snap.val()||{};
        dot(true);
        if(!modalOpen) render();
      }, err=>{ dot(false); });
      onValue(ref(db,"snacks"), snap=>{
        SDB = snap.val()||{};
        if(!modalOpen && MODE==="snacks") render();
      });
      onValue(ref(db,"activity"), snap=>{
        const raw = snap.val()||{};
        LOGS = Object.values(raw).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,200);
        if(UI.view==="act"&&!modalOpen) render();
      });
      onValue(ref(db,"usage"), snap=>{
        USAGE = snap.val()||{};
        if(UI.view==="trk"&&!modalOpen) render();
      });
      V("inv");
    });
  }catch(err){ console.error(err); }
}

function dot(live){
  const d=document.getElementById("sdot"), l=document.getElementById("slbl");
  if(d) d.className="sdot "+(live?"live":"err");
  if(l) l.textContent=live?"Live":"Offline";
}

function showLogin(){
  const app=document.getElementById("app"); if(!app) return;
  app.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:40px 32px;width:100%;max-width:400px;text-align:center">
      <div style="font-size:44px;margin-bottom:16px">📦</div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Inventory Manager</h2>
      <p style="color:var(--text2);font-size:14px;margin-bottom:28px;line-height:1.6">Sign in with your Google account to continue.</p>
      <button onclick="doSignIn()" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:15px;font-weight:600;cursor:pointer">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>
      <div id="login-err" style="color:var(--red);font-size:13px;margin-top:12px;min-height:18px"></div>
    </div>
  </div>`;
  const badge=document.getElementById("user-badge"); if(badge) badge.innerHTML="";
}

function updateUserBadge(user){
  const el=document.getElementById("user-badge"); if(!el) return;
  el.innerHTML=`
    ${user.photoURL?`<img src="${user.photoURL}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border)">`:``}
    <span style="font-size:12px;color:var(--text2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${user.displayName||user.email||"User"}</span>
    <button class="btn sm" onclick="doSignOut()">Sign Out</button>`;
}

async function doSignIn(){
  try{
    await signInWithPopup(auth, new GoogleAuthProvider());
  }catch(err){
    const e=document.getElementById("login-err");
    if(e) e.textContent="Sign-in failed. Make sure popups are allowed and try again.";
  }
}

async function doSignOut(){
  await signOut(auth);
}

/* ════════════════════════════════════════════
   SAFE FIREBASE WRITES
   ALL writes go through these — never write undefined/null.
════════════════════════════════════════════ */

// Clean a data object before any Firebase write
function clean(d){
  return {
    name:      String(d.name||"").trim(),
    sku:       String(d.sku||"").trim(),
    category:  d.category||CATS[0],
    location:  d.location||LOCS[0],
    qty:       Math.max(0, Number(d.qty)||0),
    locThresh: Math.max(1, Number(d.locThresh)||DEF_LOW),  // per-location alert
    grpThresh: Math.max(1, Number(d.grpThresh)||DEF_LOW),  // combined-total alert (All tab)
    expDate:   String(d.expDate||""),
    notes:     String(d.notes||"").trim(),
    createdAt: d.createdAt||Date.now()
  };
}

async function fAdd(data){
  const r = push(ref(db,"items"));
  await set(r, clean(data));
  await fLog(`Added "${data.name}" → ${data.location} (qty: ${data.qty})`);
}

async function fUpdate(id, fields){
  // Only write the keys provided — never overwrite unrelated fields
  const safe = {};
  if(fields.name      !== undefined) safe.name      = String(fields.name||"").trim();
  if(fields.sku       !== undefined) safe.sku        = String(fields.sku||"").trim();
  if(fields.category  !== undefined) safe.category   = fields.category||CATS[0];
  if(fields.location  !== undefined) safe.location   = fields.location||LOCS[0];
  if(fields.qty       !== undefined) safe.qty        = Math.max(0, isNaN(Number(fields.qty)) ? 0 : Number(fields.qty));
  if(fields.locThresh !== undefined) safe.locThresh  = Math.max(1,Number(fields.locThresh)||DEF_LOW);
  if(fields.grpThresh !== undefined) safe.grpThresh  = Math.max(1,Number(fields.grpThresh)||DEF_LOW);
  if(fields.expDate   !== undefined) safe.expDate    = String(fields.expDate||"");
  if(fields.notes     !== undefined) safe.notes      = String(fields.notes||"").trim();
  await update(ref(db,`items/${id}`), safe);
}

async function fSetQty(id, qty){
  await update(ref(db,`items/${id}`), { qty: Math.max(0,Number(qty)||0) });
}

async function fDelete(id){
  await remove(ref(db,`items/${id}`));
}

async function fLog(msg){
  const savedName = localStorage.getItem("inv_display_name")||"";
  const who = savedName || (currentUser?.displayName||"") || (currentUser?.email||"Unknown");
  await set(push(ref(db,"activity")), {
    msg:  `[${who}] ${String(msg)}`,
    ts:   Date.now(),
    time: new Date().toLocaleString()
  });
}

/* ════════════════════════════════════════════
   DATA HELPERS
════════════════════════════════════════════ */
const esc  = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const days = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;

// Return all valid items as an array
function allItems(){
  return Object.entries(DB)
    .filter(([,v]) => v && v.name && String(v.name).trim() && v.location && String(v.location).trim())
    .map(([id,v]) => ({...v, id,
      locThresh: Number(v.locThresh) || Number(v.lowThreshold) || DEF_LOW,
      grpThresh: Number(v.grpThresh) || Number(v.lowThreshold) || DEF_LOW,
      sortOrder: v.sortOrder != null ? Number(v.sortOrder) : 9999
    }));
}

// Encode array of Firebase IDs safely for HTML onclick attributes
const encIds = ids => encodeURIComponent(ids.join(","));
const decIds = s   => decodeURIComponent(s).split(",").filter(Boolean);

/* ════════════════════════════════════════════
   GROUPING
════════════════════════════════════════════ */
function byNameLoc(arr){
  const m = {};
  arr.forEach(i => {
    const k = i.name.toLowerCase().trim() + "||" + i.location;
    (m[k] = m[k]||[]).push(i);
  });
  return Object.values(m).sort((a,b)=>{
    const sa = Math.min(...a.map(i=>Number(i.sortOrder??9999)));
    const sb = Math.min(...b.map(i=>Number(i.sortOrder??9999)));
    if(sa!==sb) return sa-sb;
    return a[0].name.localeCompare(b[0].name);
  });
}

function byName(arr){
  const m = {};
  arr.forEach(i => {
    const k = i.name.toLowerCase().trim();
    (m[k] = m[k]||[]).push(i);
  });
  return Object.values(m).sort((a,b)=>{
    const sa = Math.min(...a.map(i=>Number(i.sortOrder??9999)));
    const sb = Math.min(...b.map(i=>Number(i.sortOrder??9999)));
    if(sa!==sb) return sa-sb;
    return a[0].name.localeCompare(b[0].name);
  });
}

/* ════════════════════════════════════════════
   STATUS LOGIC

   Two separate thresholds:
   ─ grpThresh: set from All-tab group edit
                compared against COMBINED total across ALL locations
   ─ locThresh: set from individual item edit
                compared against that location's combined total only

   allStatus(nameGroup)  → uses grpThresh + combined total
   locStatus(locGroup)   → uses locThresh + location total
════════════════════════════════════════════ */
function allStatus(nameGroup){
  const total = nameGroup.reduce((s,i)=>s+(i.qty||0), 0);
  if(total === 0) return "out";
  if(nameGroup.some(i=>i.expDate && new Date(i.expDate)<new Date())) return "exp";
  // grpThresh: take the maximum set across any record in the group
  const thresh = nameGroup.reduce((mx,i)=>Math.max(mx, i.grpThresh||DEF_LOW), 0);
  return total <= thresh ? "low" : "ok";
}

function locStatus(locGroup){
  const total = locGroup.reduce((s,i)=>s+(i.qty||0), 0);
  if(total === 0) return "out";
  if(locGroup.some(i=>i.expDate && new Date(i.expDate)<new Date())) return "exp";
  const thresh = locGroup.reduce((mx,i)=>Math.max(mx, i.locThresh||DEF_LOW), 0);
  return total <= thresh ? "low" : "ok";
}

const stLabel = s => ({ok:"In Stock",low:"Low Stock",out:"Out of Stock",exp:"Expired"}[s]||s);

/* ════════════════════════════════════════════
   STATS
════════════════════════════════════════════ */
function calcStats(arr, isAll){
  const groups = isAll ? byName(arr) : byNameLoc(arr);
  let low=0, out=0;
  const expSet = new Set();
  groups.forEach(g => {
    const st = isAll ? allStatus(g) : locStatus(g);
    if(st==="out") out++;
    else if(st==="low") low++;
    // Count expiring by unique name on All tab, by name+location on location tabs
    g.forEach(i=>{
      const d=days(i.expDate);
      if(d!==null&&d>0&&d<=30){
        const key = isAll ? i.name.toLowerCase().trim() : i.name.toLowerCase().trim()+"||"+i.location;
        expSet.add(key);
      }
    });
  });
  return { total:groups.length, low, out, expiring:expSet.size };
}

/* ════════════════════════════════════════════
   FILTERING
════════════════════════════════════════════ */
function filtered(){
  let arr = allItems();

  // Scope to current tab
  if(UI.tab > 0) arr = arr.filter(i=>i.location===LOCS[UI.tab-1]);

  // Status filter
  if(UI.fStatus !== "all"){
    if(UI.tab === 0){
      // All tab: compute combined status per name, show only one record per name group
      const nameMap = {};  // name.lower → { total, thresh, hasExp }
      arr.forEach(i => {
        const k = i.name.toLowerCase().trim();
        if(!nameMap[k]) nameMap[k] = { total:0, thresh:0, hasExp:false };
        nameMap[k].total += (i.qty||0);
        if(i.grpThresh > nameMap[k].thresh) nameMap[k].thresh = i.grpThresh;
        if(i.expDate && new Date(i.expDate)<new Date()) nameMap[k].hasExp = true;
      });
      const seenName = new Set();
      arr = arr.filter(i => {
        const k = i.name.toLowerCase().trim();
        const nm = nameMap[k] || {};
        const st = nm.total===0?"out": nm.hasExp?"exp": nm.total<=nm.thresh?"low":"ok";
        if(st !== UI.fStatus) return false;
        if(seenName.has(k)) return false;
        seenName.add(k);
        return true;
      });
    } else {
      // Location tab: compute combined status per name+location
      const nlMap = {};
      arr.forEach(i => {
        const k = i.name.toLowerCase().trim()+"||"+i.location;
        if(!nlMap[k]) nlMap[k] = { total:0, thresh:0, hasExp:false };
        nlMap[k].total += (i.qty||0);
        if(i.locThresh > nlMap[k].thresh) nlMap[k].thresh = i.locThresh;
        if(i.expDate && new Date(i.expDate)<new Date()) nlMap[k].hasExp = true;
      });
      arr = arr.filter(i => {
        const k = i.name.toLowerCase().trim()+"||"+i.location;
        const nm = nlMap[k] || {};
        const st = nm.total===0?"out": nm.hasExp?"exp": nm.total<=nm.thresh?"low":"ok";
        return st === UI.fStatus;
      });
    }
  }

  // Category filter
  if(UI.fCat !== "all") arr = arr.filter(i=>i.category===UI.fCat);

  // Search
  if(UI.search){
    const q = UI.search.toLowerCase();
    arr = arr.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.sku||"").toLowerCase().includes(q) ||
      (i.notes||"").toLowerCase().includes(q)
    );
  }

  return arr.sort((a,b)=>{
    const sa = Number(a.sortOrder ?? 9999), sb = Number(b.sortOrder ?? 9999);
    if(sa!==sb) return sa-sb;
    return a.name.localeCompare(b.name);
  });
}

/* ════════════════════════════════════════════
   EXPIRATION SUMMARY HTML
════════════════════════════════════════════ */
function expHtml(group){
  const sorted = group.filter(i=>i.expDate).sort((a,b)=>new Date(a.expDate)-new Date(b.expDate));
  const noDate = group.filter(i=>!i.expDate);
  if(!sorted.length && !noDate.length) return "—";
  const parts = sorted.map(i=>{
    const d=days(i.expDate), warn=d!==null&&d<=30;
    return `<div style="white-space:nowrap;${warn?"color:var(--red);font-weight:600":""}">${i.qty}×&nbsp;${i.expDate}${warn?" ⚠️":""}</div>`;
  });
  if(noDate.length){
    const ndqty = noDate.reduce((s,i)=>s+(i.qty||0),0);
    parts.push(`<div style="color:var(--text3);white-space:nowrap">${ndqty}×&nbsp;no date</div>`);
  }
  return parts.join("");
}

/* ════════════════════════════════════════════
   LOCATION BREAKDOWN HTML (All tab)
════════════════════════════════════════════ */
function locBreak(nameGroup){
  // Sub-group by location
  const m = {};
  nameGroup.filter(i=>i.location).forEach(i=>{ (m[i.location]=m[i.location]||[]).push(i); });
  if(!Object.keys(m).length) return `<span style="color:var(--text3)">No locations</span>`;
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([loc,its])=>{
    const qty = its.reduce((s,i)=>s+(i.qty||0),0);
    const sid = encIds(its.map(i=>i.id));
    return `<div class="loc-row">
      <div class="loc-row-txt">
        <span style="font-weight:600">${qty}×</span>
        <span style="color:var(--text2);margin-left:4px">${esc(loc)}</span>
        <span style="color:var(--text3);font-size:11px;margin-left:6px">${expHtml(its)}</span>
      </div>
      <button class="ab" style="opacity:.4;font-size:12px" onclick="doDelGroup('${sid}')" title="Delete ${esc(loc)}">🗑️</button>
    </div>`;
  }).join("");
}

/* ════════════════════════════════════════════
   ROUTING
════════════════════════════════════════════ */
function setMode(mode){
  MODE = mode;
  const ds = document.getElementById("mode-drinks");
  const ss = document.getElementById("mode-snacks");
  if(ds){ ds.style.background=mode==="drinks"?"var(--scarlet)":"transparent"; ds.style.color=mode==="drinks"?"#fff":"rgba(255,255,255,.6)"; }
  if(ss){ ss.style.background=mode==="snacks"?"var(--scarlet)":"transparent"; ss.style.color=mode==="snacks"?"#fff":"rgba(255,255,255,.6)"; }
  // Swap nav: drinks gets full nav, snacks gets inv + exp + cfg
  const drinkNav = document.getElementById("nav-act");
  const drinkAlr = document.getElementById("nav-alr");
  const drinkExp = document.getElementById("nav-exp");
  const bnavAct  = document.getElementById("bnav-act");
  const bnavAlr  = document.getElementById("bnav-alr");
  const bnavExp  = document.getElementById("bnav-exp");
  if(mode==="snacks"){
    [drinkNav,drinkAlr,bnavAct,bnavAlr].forEach(el=>{ if(el) el.style.display="none"; });
    if(drinkExp){ drinkExp.textContent="🗓️ Expiration"; drinkExp.onclick=()=>SV("exp"); }
    if(bnavExp){ bnavExp.querySelector(".ni").textContent="🗓️"; bnavExp.onclick=()=>SV("exp"); }
    SUI.sview="inv"; SUI.tab=0; SUI.fCat="all"; SUI.search="";
  } else {
    [drinkNav,drinkAlr,bnavAct,bnavAlr].forEach(el=>{ if(el) el.style.display=""; });
    if(drinkExp){ drinkExp.textContent="🗓️ Expiration"; drinkExp.onclick=()=>V("exp"); }
    if(bnavExp){ bnavExp.querySelector(".ni").textContent="🗓️"; bnavExp.onclick=()=>V("exp"); }
  }
  const fab=document.getElementById("fab");
  if(fab) fab.style.display="flex";
  render();
}

// Snacks view navigation
function SV(view){
  SUI.sview=view;
  ["inv","exp","cfg"].forEach(v=>{
    document.getElementById("nav-"+v)?.classList.toggle("on",v===view);
    document.getElementById("bnav-"+v)?.classList.toggle("on",v===view);
  });
  const fab=document.getElementById("fab");
  if(fab) fab.style.display=view==="inv"?"flex":"none";
  render();
}

function V(view){
  UI.view = view;
  ["inv","act","alr","exp","trk","cfg"].forEach(v=>{
    document.getElementById("nav-"+v)?.classList.toggle("on", v===view);
    document.getElementById("bnav-"+v)?.classList.toggle("on", v===view);
  });
  const fab = document.getElementById("fab");
  if(fab) fab.style.display = view==="inv" ? "flex" : "none";
  render();
}

function render(){
  if(modalOpen) return;
  window._ids = [];
  const app = document.getElementById("app");
  if(!app) return;
  const searchEl  = document.getElementById("search-input");
  const hadFocus  = searchEl && document.activeElement === searchEl;
  const cursorPos = searchEl ? searchEl.selectionStart : null;
  if(MODE==="snacks"){
    if(SUI.sview==="exp")      renderSnackExp(app);
    else if(SUI.sview==="cfg") renderCfg(app);
    else                       renderSnacks(app);
  } else {
    if(UI.view==="inv")      renderInv(app);
    else if(UI.view==="act") renderAct(app);
    else if(UI.view==="alr") renderAlr(app);
    else if(UI.view==="exp") renderExp(app);
    else if(UI.view==="trk") renderTracker(app);
    else if(UI.view==="cfg") renderCfg(app);
  }
  if(hadFocus){
    const newEl = document.getElementById("search-input");
    if(newEl){ newEl.focus(); if(cursorPos!==null) newEl.setSelectionRange(cursorPos,cursorPos); }
  }
}

// Search handler — updates state and re-renders while preserving input focus
function onSearch(val){
  UI.search = val;
  render();
}

/* ════════════════════════════════════════════
   SHARED HTML FRAGMENTS
════════════════════════════════════════════ */
function tabsHtml(){
  return `<div class="tabs-wrap"><div class="tabs">
    <button class="tab ${UI.tab===0?"on":""}" onclick="UI.tab=0;render()">All</button>
    ${LOCS.map((l,i)=>`<button class="tab ${UI.tab===i+1?"on":""}" onclick="UI.tab=${i+1};render()">${esc(l)}</button>`).join("")}
  </div></div>`;
}

function statsHtml(arr, isAll){
  const s = calcStats(arr, isAll);
  return `<div class="stats">
    <div class="sc"><div class="sc-lbl">${isAll?"Unique Items":"Line Items"}</div><div class="sc-val">${s.total}</div></div>

/* ════════════════════════════════════════════
   RENDER: ALERTS
════════════════════════════════════════════ */
function renderAlr(app){
  const arr = allItems();
  const now = new Date();

  // ── PER-LOCATION low/out (locThresh vs location total) ──
  const locMap = {};
  LOCS.forEach(l=>{ locMap[l]=[]; });
  byNameLoc(arr).forEach(g=>{
    const loc = g[0].location;
    const st  = locStatus(g);
    if(st==="low"||st==="out") (locMap[loc]=locMap[loc]||[]).push({g,st});
  });

  // ── ALL-TAB combined low (grpThresh vs combined total) ──
  const allLowG = byName(arr).filter(g=>allStatus(g)==="low");
  const allOutG = byName(arr).filter(g=>allStatus(g)==="out");

  // ── Expiry buckets grouped by location ──
  const expByLoc  = {};   // already expired
  const soon30    = {};   // expires in 1–30 days
  const soon60    = {};   // expires in 31–60 days
  arr.forEach(i=>{
    const d = days(i.expDate);
    if(!i.expDate) return;
    if(new Date(i.expDate)<now){
      (expByLoc[i.location]=expByLoc[i.location]||[]).push(i);
    } else if(d!==null&&d<=30){
      (soon30[i.location]=soon30[i.location]||[]).push(i);
    } else if(d!==null&&d<=60){
      (soon60[i.location]=soon60[i.location]||[]).push(i);
    }
  });

  // Counts
  const cntOut   = LOCS.reduce((s,l)=>s+(locMap[l]||[]).filter(r=>r.st==="out").length,0);
  const cntLoc   = LOCS.reduce((s,l)=>s+(locMap[l]||[]).filter(r=>r.st==="low").length,0);
  const cntExp   = Object.values(expByLoc).reduce((s,a)=>s+a.length,0);
  const cnt30    = Object.values(soon30).reduce((s,a)=>s+a.length,0);
  const cnt60    = Object.values(soon60).reduce((s,a)=>s+a.length,0);

  // ── Row builders ──
  function allRow(g){
    const total  = g.reduce((s,i)=>s+(i.qty||0),0);
    const st     = allStatus(g);
    const thresh = g.reduce((mx,i)=>Math.max(mx,i.grpThresh||DEF_LOW),0);
    const locs   = [...new Set(g.map(i=>i.location))].join(", ");
    return `<div class="arow" style="padding-left:24px">
      <div class="arow-info">
        <div class="arow-name">${esc(g[0].name)}</div>
        <div class="arow-sub">${esc(locs)} · Combined alert at: ${thresh}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;font-size:15px">${total}</span>
        <span class="badge ${st}">${stLabel(st)}</span>
      </div></div>`;
  }

  function locRow(g, st){
    const total  = g.reduce((s,i)=>s+(i.qty||0),0);
    const thresh = g.reduce((mx,i)=>Math.max(mx,i.locThresh||DEF_LOW),0);
    return `<div class="arow" style="padding-left:24px">
      <div class="arow-info">
        <div class="arow-name">${esc(g[0].name)}</div>
        <div class="arow-sub">${esc(g[0].category||"—")} · Alert at: ${thresh}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;font-size:15px">${total}</span>
        <span class="badge ${st}">${stLabel(st)}</span>
      </div></div>`;
  }

  function expRow(i){
    const d = days(i.expDate);
    return `<div class="arow" style="padding-left:24px">
      <div class="arow-info">
        <div class="arow-name">${esc(i.name)}</div>
        <div class="arow-sub">${esc(i.category||"—")} · Exp: ${i.expDate}${d!==null?` (${d}d)`:""}</div>
      </div>
      <span style="font-weight:700;font-size:15px">${i.qty}</span>
    </div>`;
  }

  function locHdr(loc, cnt){
    return `<div style="padding:8px 16px 6px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.4px">
      📍 ${esc(loc)} <span style="color:var(--text3);font-weight:400">(${cnt})</span>
    </div>`;
  }

  function allHdr(cnt){
    return `<div style="padding:8px 16px 6px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.4px">
      🌐 All Locations — Combined Total <span style="color:var(--text3);font-weight:400">(${cnt})</span>
    </div>`;
  }

  // Per-location rows only
  function buildLocRows(stFilter){
    let html="";
    LOCS.forEach(loc=>{
      const rows=(locMap[loc]||[]).filter(r=>r.st===stFilter);
      if(!rows.length) return;
      html+=locHdr(loc, rows.length);
      rows.forEach(({g,st})=>{ html+=locRow(g,st); });
    });
    return html;
  }

  // Per-location expiry rows only (no all-locations header)
  function buildExpRows(byLocObj){
    let html="";
    LOCS.forEach(loc=>{
      const its=byLocObj[loc];
      if(!its||!its.length) return;
      html+=locHdr(loc, its.length);
      its.forEach(i=>{ html+=expRow(i); });
    });
    return html;
  }

  function sec(color,title,innerHtml,empty){
    return `<div class="card" style="margin-bottom:12px">
      <div class="sec-hdr" style="color:${color}">${title}</div>
      ${innerHtml||`<div style="padding:14px 16px;color:var(--text2);font-size:13px">${empty}</div>`}
    </div>`;
  }

  // Out of Stock: per-location only
  const outHtml = buildLocRows("out");

  // Low Stock: combined All-tab section first, then per-location
  let lowHtml = "";
  if(allLowG.length){
    lowHtml += allHdr(allLowG.length);
    allLowG.forEach(g=>{ lowHtml+=allRow(g); });
  }
  lowHtml += buildLocRows("low");

  app.innerHTML =
    sec("var(--red)",   `🚫 Out of Stock (${cntOut})`,          outHtml||"",  "No out-of-stock items.")   +
    sec("var(--yellow)",`⚠️ Low Stock (${allLowG.length} combined · ${cntLoc} by location)`, lowHtml||"", "No low-stock items.") +
    sec("var(--red)",   `🗓️ Expired (${cntExp})`,               buildExpRows(expByLoc), "No expired items.") +
    sec("var(--yellow)",`⏳ Expiring in 30 Days (${cnt30})`,     buildExpRows(soon30),   "Nothing expiring in 30 days.") +
    sec("var(--blue)",  `📅 Expiring in 31–60 Days (${cnt60})`,  buildExpRows(soon60),   "Nothing expiring in 31–60 days.");
}

/* ════════════════════════════════════════════
   RENDER: EXPIRATION CALENDAR
════════════════════════════════════════════ */
function renderExp(app){
  const arr  = allItems();
  const now  = new Date();
  const withD = arr.filter(i=>i.expDate);
  const noD   = arr.filter(i=>!i.expDate);

  const expC  = withD.filter(i=>new Date(i.expDate)<now).length;
  const thisM = withD.filter(i=>{ const d=new Date(i.expDate); return d>=now&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); }).length;
  const n30   = withD.filter(i=>{ const d=days(i.expDate); return d!==null&&d>0&&d<=30; }).length;

  let h=`<div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="sc"><div class="sc-lbl">With Exp. Date</div><div class="sc-val">${withD.length}</div></div>
    <div class="sc"><div class="sc-lbl">Expired</div><div class="sc-val ${expC>0?"r":""}">${expC}</div></div>
    <div class="sc"><div class="sc-lbl">This Month</div><div class="sc-val ${thisM>0?"y":""}">${thisM}</div></div>
    <div class="sc"><div class="sc-lbl">Next 30 Days</div><div class="sc-val ${n30>0?"y":""}">${n30}</div></div>
  </div>`;

  if(!withD.length&&!noD.length){
    h+=`<div class="card"><div class="empty"><div class="empty-icon">🗓️</div>No expiration dates set yet.</div></div>`;
    app.innerHTML=h; return;
  }

  // Bucket items by month — parse YYYY-MM-DD directly to avoid timezone shift
  const buckets={};
  withD.forEach(i=>{
    const k=i.expDate.slice(0,7); // "YYYY-MM" — no Date parsing needed
    (buckets[k]=buckets[k]||[]).push(i);
  });
  const keys=Object.keys(buckets).sort();

  function urgency(k){
    const[y,m]=k.split("-"),me=new Date(+y,+m,0);
    if(me<now) return "past";
    const ms=new Date(+y,+m-1,1);
    if(ms.getFullYear()===now.getFullYear()&&ms.getMonth()===now.getMonth()) return "cur";
    const nxt=new Date(now.getFullYear(),now.getMonth()+1,1);
    if(ms>=nxt&&ms<new Date(now.getFullYear(),now.getMonth()+2,1)) return "next";
    return "future";
  }
  const US={
    past:  {b:"var(--red)",   h:"var(--red)",   bg:"var(--red-bg)",   ic:"\uD83D\uDEAB"},
    cur:   {b:"var(--yellow)",h:"var(--yellow)",bg:"var(--yellow-bg)",ic:"\u26A0\uFE0F"},
    next:  {b:"var(--yellow)",h:"var(--yellow)",bg:"var(--yellow-bg)",ic:"\u23F3"},
    future:{b:"var(--border)",h:"var(--text2)", bg:"var(--bg2)",       ic:"\uD83D\uDCC5"}
  };
  function mlabel(k){const[y,m]=k.split("-");return new Date(+y,+m-1,1).toLocaleString("default",{month:"long",year:"numeric"});}

  keys.forEach(k=>{
    const u=urgency(k),s=US[u];
    // Within each month: group by item name, sort groups by earliest expDate in that month
    const monthItems=buckets[k].slice();
    const nameMap={};
    monthItems.forEach(i=>{ const nk=i.name.toLowerCase().trim(); (nameMap[nk]=nameMap[nk]||[]).push(i); });
    const nameGroups=Object.values(nameMap).sort((a,b)=>{
      // Get earliest expDate in each group — ISO strings compare correctly
      const ea=a.map(i=>i.expDate).sort()[0];
      const eb=b.map(i=>i.expDate).sort()[0];
      return ea<eb?-1:ea>eb?1:a[0].name.localeCompare(b[0].name);
    });
    const itemCount=nameGroups.length;

    let rows="";
    nameGroups.forEach((batches,gi)=>{
      // Sort batches by expDate then location
      batches.sort((a,b)=>new Date(a.expDate)-new Date(b.expDate)||a.location.localeCompare(b.location));
      const isLastGroup=gi===nameGroups.length-1;
      batches.forEach((item,bi)=>{
        const d=days(item.expDate);
        // Compare date strings directly (YYYY-MM-DD) to avoid timezone shift
        const todayStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
        const expired=item.expDate<todayStr;
        const soon=!expired&&d!==null&&d<=30;
        const dateClr=expired?"var(--red)":soon?"var(--yellow)":"var(--text)";
        const dateWarn=expired?" 🚫":soon?` ⚠️ ${d}d`:`  ${d}d`;
        const showName=bi===0;
        const isLastRow=isLastGroup&&bi===batches.length-1;
        // Only draw a divider after the LAST batch of each item group
        const isLastBatch=bi===batches.length-1;
        const borderStyle=isLastRow?"none":isLastBatch?"2px solid var(--border)":"none";
        rows+=`<div style="display:flex;align-items:center;padding:8px 16px;border-bottom:${borderStyle}">
          <div style="width:190px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${showName
              ? `<span style="font-weight:700;font-size:13px;color:var(--text)">${esc(item.name)}</span>`
              : `<span style="font-size:12px;color:var(--text3);padding-left:6px">↳</span>`}
          </div>
          <div style="width:180px;flex-shrink:0;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${esc(item.location)}
          </div>
          <div style="flex-shrink:0;white-space:nowrap;font-size:13px;font-weight:700;color:${dateClr};padding-right:20px">
            ${item.qty}× ${item.expDate}
          </div>
          <div style="flex:1;text-align:right;white-space:nowrap;font-size:12px;font-weight:600;color:${dateClr}">
            ${dateWarn}
          </div>
        </div>`;
      });
    });

    h+=`<div class="card ecal" style="border-left-color:${s.b};margin-bottom:12px">
      <div class="sec-hdr" style="color:${s.h};background:${s.bg};display:flex;justify-content:space-between;align-items:center">
        <span>${s.ic} ${mlabel(k)}</span>
        <span style="font-size:12px;opacity:.8">${itemCount} item${itemCount!==1?"s":""}</span>
      </div>${rows}</div>`;
  });

  if(noD.length){
    let rows="";
    noD.sort((a,b)=>a.name.localeCompare(b.name)).forEach((item,idx)=>{
      rows+=`<div style="display:flex;align-items:center;padding:8px 16px;border-bottom:${idx===noD.length-1?"none":"1px solid var(--border)"}">
        <div style="width:200px;flex-shrink:0;font-size:13px;font-weight:600;padding-right:12px">${item.name}</div>
        <div style="flex:1;font-size:12px;color:var(--text2)">${item.location}</div>
        <div style="flex-shrink:0;font-weight:700;font-size:13px">${item.qty}\u00D7 <span style="color:var(--text3);font-weight:400;font-size:12px">no date</span></div>
      </div>`;
    });
    h+=`<div class="card ecal" style="border-left-color:var(--border);opacity:.8;margin-bottom:12px">
      <div class="sec-hdr" style="color:var(--text3);background:var(--bg2);display:flex;justify-content:space-between">
        <span>\uD83D\uDCE6 No Expiration Date</span><span style="font-size:12px">${noD.length} item${noD.length!==1?"s":""}</span>
      </div>${rows}</div>`;
  }
  app.innerHTML=h;
}

function showModal(html, keepOpen=false){
  modalOpen=true;
  document.getElementById("mroot").innerHTML=
    `<div class="mbg" onclick="${keepOpen?"":"if(event.target===this)closeModal()"}"><div class="modal">${html}</div></div>`;
}

function closeModal(){
  modalOpen=false;
  document.getElementById("mroot").innerHTML="";
  render();
}

// Silent close: clears modal but does NOT call render() immediately.
// Use before async writes so render() fires after all writes complete.
function silentClose(){
  modalOpen=false;
  document.getElementById("mroot").innerHTML="";
}

async function doAdd(){
  const name=fv("f-name");
  if(!name){alert("Item name is required.");return;}
  const lt=fvn("f-lt",DEF_LOW);

  // Inherit grpThresh from any existing record with the same name
  // so adding a new batch never resets the group's combined alert
  const siblings = allItems().filter(i=>i.name.toLowerCase().trim()===name.toLowerCase().trim());
  const inheritedGrpThresh = siblings.length > 0
    ? siblings.reduce((mx,i)=>Math.max(mx, i.grpThresh||DEF_LOW), 0)
    : lt;

  const data={
    name, sku:fv("f-sku"), category:fvs("f-cat"), location:fvs("f-loc"),
    qty:fvn("f-qty"), locThresh:lt, grpThresh:inheritedGrpThresh,
    expDate:fv("f-exp"), notes:fv("f-notes")
  };
  silentClose();
  await fAdd(data);
  render();
}

        </div>
      </div>
    </div>
    <div class="macts">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" onclick="doEditGroup()">Save All Changes</button>

// Called on every input/change event — stores value in _eg immediately
function egSet(field, idx, val){
  if(_eg.batches[idx]) _eg.batches[idx][field] = val;
}
function egShared(field, val){
  _eg.shared[field] = val;
}

async function doEditGroup(){
  const batches = window._egBatches;
  if(!batches||!batches.length){ closeModal(); return; }

  // Read shared fields from DOM
  const name = (document.getElementById("eg-name-shared")?.value||"").trim();
  if(!name){ alert("Item name is required."); return; }
  const category = document.getElementById("eg-cat-shared")?.value || CATS[0];
  const sku      = (document.getElementById("eg-sku-shared")?.value||"").trim();
  const lt       = Math.max(1, parseInt(document.getElementById("eg-lt-shared")?.value)||DEF_LOW);

  // Read per-batch qty/exp/notes from DOM — IDs and grpThresh from window._egBatches
  const writes = batches.map(b=>{
    const qty   = Math.max(0, parseInt(document.getElementById("eg-qty-"+b.idx)?.value)||0);
    const exp   = document.getElementById("eg-exp-"+b.idx)?.value||"";
    const notes = (document.getElementById("eg-notes-"+b.idx)?.value||"").trim();
    return { id:b.id, qty, expDate:exp, notes, grpThresh:b.grpThresh };
  });

  silentClose();

  for(const w of writes){
    const data = { name, category, sku, qty:w.qty, locThresh:lt, grpThresh:w.grpThresh, expDate:w.expDate, notes:w.notes };
    await update(ref(db,`items/${w.id}`), data);
    if(DB[w.id]) DB[w.id] = {...DB[w.id], ...data};
  }

  await fLog(`Updated "${name}" — edited ${writes.length} batch${writes.length!==1?"es":""} in ${writes.map(w=>w.expDate||"no date").join(", ")}`);;
  window._egBatches = [];
  render();
}


function openGrpEdit(sid){

  }));

      <input id="ge-gt" type="number" min="1" value="${curGrp}" inputmode="numeric">
      <div style="font-size:12px;color:var(--text3);margin-top:5px">

      </div>

async function doGrpEdit(sid){
  // 1. Read ALL form values while modal DOM still exists
  const name     = fv("ge-name");
  const category = fvs("ge-cat");
  const sku      = fv("ge-sku");
  const grpT     = Math.max(1, fvn("ge-gt", DEF_LOW));

  if(!name){alert("Item name is required.");return;}

  // 2. Silent close
  silentClose();

  // 3. Find ALL records with this item name (not just those in sid —
  //    catches records added after the last group edit)
  const originalName = DB[decIds(sid)[0]]?.name || name;
  const allSiblings  = allItems().filter(i=>
    i.name.toLowerCase().trim() === originalName.toLowerCase().trim()
  );

  for(const item of allSiblings){
    await fUpdate(item.id, { name, category, sku, grpThresh: grpT });
    // Update DB locally immediately
    if(DB[item.id]) DB[item.id] = { ...DB[item.id], name, category, sku, grpThresh: grpT };
  }

  await fLog(`Updated group "${name}" — combined alert set to ${grpT}`);
  render();
}

  const total = grp.reduce((s,i)=>s+(i.qty||0),0);
  const locs  = [...new Set(grp.map(i=>i.location))];
  const lines = locs.map(l=>`  • ${l}: ${grp.filter(i=>i.location===l).reduce((s,i)=>s+(i.qty||0),0)} units`).join("\n");
  const msg   = grp.length===1
    ? `Delete "${rep.name}" from ${rep.location} (qty: ${total})?\n\nThis cannot be undone.`
    : `Delete ALL records of "${rep.name}"?\n\n${lines}\n\nTotal: ${total} units. This cannot be undone.`;
  if(!confirm(msg)) return;
  for(const id of ids) await fDelete(id);
  await fLog(`Deleted "${rep.name}" (${total} units across ${locs.join(", ")})`);
}

/* ════════════════════════════════════════════
   DRAG-TO-REORDER (mouse-based — reliable cross-browser)
════════════════════════════════════════════ */
let _drag = null; // { id, ghostEl, sourceRow, startY, lastOverId }

function dragBegin(event, encodedId){
  event.preventDefault();
  const sourceRow = event.currentTarget.closest("tr");
  if(!sourceRow) return;

  // Create ghost element
  const ghost = document.createElement("div");
  ghost.style.cssText = `
    position:fixed;z-index:9999;pointer-events:none;
    background:var(--bg);border:2px solid var(--scarlet);border-radius:var(--r);
    padding:10px 16px;font-size:13px;font-weight:600;color:var(--text);
    box-shadow:0 8px 32px rgba(0,0,0,.25);opacity:.95;
    white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis;
  `;
  // Get item name from the row
  const nameCell = sourceRow.querySelectorAll("td")[1];
  ghost.textContent = "⠿ " + (nameCell?.textContent?.trim()||"Item");
  document.body.appendChild(ghost);

  _drag = { id:encodedId, ghost, sourceRow, startY:event.clientY, lastOverId:null };
  sourceRow.style.opacity = "0.4";
  moveGhost(event.clientX, event.clientY);

  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup",   onDragEnd);
}

function moveGhost(x, y){
  if(!_drag) return;
  _drag.ghost.style.left = (x + 14) + "px";
  _drag.ghost.style.top  = (y - 10) + "px";
}

function onDragMove(event){
  if(!_drag) return;
  moveGhost(event.clientX, event.clientY);

  // Find which row we're over
  _drag.ghost.style.display = "none"; // temporarily hide so elementFromPoint works
  const el = document.elementFromPoint(event.clientX, event.clientY);
  _drag.ghost.style.display = "";

  const overRow = el?.closest("tr[data-drag-id]");
  const overId  = overRow?.dataset?.dragId || null;

  // Update highlight
  document.querySelectorAll("tr.drag-over").forEach(r=>r.classList.remove("drag-over"));
  if(overRow && overId !== _drag.id) overRow.classList.add("drag-over");
  _drag.lastOverId = overId;
}

async function onDragEnd(event){
  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup",   onDragEnd);
  if(!_drag) return;

  const { id:fromEncoded, ghost, sourceRow } = _drag;

  ghost.style.display = "none";
  const el = document.elementFromPoint(event.clientX, event.clientY);
  ghost.style.display = "";
  const overRow = el?.closest("tr[data-drag-id]");
  const finalOverId = overRow?.dataset?.dragId || _drag.lastOverId;

  _drag = null;

  ghost.remove();
  sourceRow.style.opacity = "";
  document.querySelectorAll("tr.drag-over").forEach(r=>r.classList.remove("drag-over"));

  if(!finalOverId || finalOverId === fromEncoded) return;

  const fromId = decodeURIComponent(fromEncoded);
  const toId   = decodeURIComponent(finalOverId);

  const arr    = filtered();
  const groups = UI.tab===0 ? byName(arr) : byNameLoc(arr);

  const fromIdx = groups.findIndex(g=>g.some(i=>i.id===fromId));
  const toIdx   = groups.findIndex(g=>g.some(i=>i.id===toId));
  if(fromIdx===-1 || toIdx===-1 || fromIdx===toIdx) return;

  const reordered = groups.slice();
  const [moved] = reordered.splice(fromIdx, 1);
  reordered.splice(toIdx, 0, moved);

  // Build one atomic update object — all sortOrders in a single Firebase call
  const updates = {};
  for(let i=0; i<reordered.length; i++){
    for(const item of reordered[i]){
      updates[`items/${item.id}/sortOrder`] = i;
      if(DB[item.id]) DB[item.id].sortOrder = i;
    }
  }
  await update(ref(db,"/"), updates);
  render();
}

let _qaRows = [];  // snapshot at modal-open time

function openQtyAdj(sid){

  });

  let rows="";
  _qaRows.forEach((item,idx)=>{
    const locLine = multiLoc
      ? `<div style="color:var(--blue);font-weight:600;font-size:11px;text-transform:uppercase;margin-bottom:2px">${esc(item.location)}</div>`
      : "";
    rows+=`<div class="brow">

        <div class="brow-sub" id="qa-cur-${idx}">Current: ${item.qty||0}</div>
      </div>

          style="width:52px;padding:5px 4px;border:1px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);text-align:center"
          oninput="qaInput(${idx},parseInt(this.value)||0)">
        <button class="qb" onclick="qaStep(${idx},1)">+</button>
      </div>
    </div>`;
  });

  const subtitle = multiLoc
    ? `${[...new Set(grp.map(i=>i.location))].length} locations · ${grp.reduce((s,i)=>s+(i.qty||0),0)} total`
    : esc(rep.location);

  showModal(`<div class="mhandle"></div><h2>± Adjust Quantities</h2>
    <div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:16px">
      <div style="font-weight:700;font-size:15px;margin-bottom:2px">${esc(rep.name)}</div>
      <div style="font-size:13px;color:var(--text2)">${subtitle}</div>
    </div>
    ${rows}

      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" style="flex:1" onclick="doQaSave()">Save Changes</button>
    </div>`);
}

function qaStep(idx, delta){
  if(!_qaRows[idx]) return;
  const inp = document.getElementById("qa-val-"+idx); if(!inp) return;
  const cur = parseInt(inp.value)||0;
  const nv  = Math.max(0, cur+delta);
  inp.value = nv;
  _qaRows[idx]._cur = nv; // store locally only
}

function qaInput(idx, val){
  if(!_qaRows[idx]) return;
  _qaRows[idx]._cur = Math.max(0, isNaN(val)?0:val);
}

async function doQaSave(){
  // Read final values from DOM, write only changed rows
  const changes = [];
  _qaRows.forEach((item, idx)=>{
    const inp = document.getElementById("qa-val-"+idx);
    const nv  = inp ? Math.max(0, parseInt(inp.value)||0) : (item._cur||item.qty||0);
    if(nv !== (item.qty||0)) changes.push({id:item.id, nv});
  });
  silentClose();
  for(const {id,nv} of changes){
    if(DB[id]) DB[id].qty = nv;
    await fSetQty(id, nv);
  }
  if(changes.length){
    const itemName = _qaRows[0]?.name||"item";
    const detail = changes.map(({id,nv})=>{
      const orig = _qaRows.find(r=>r.id===id);
      return orig ? `${orig.expDate||"no date"}: ${orig.qty||0}→${nv}` : `→${nv}`;
    }).join(", ");
    await fLog(`Adjusted "${itemName}" — ${detail}`);
  };
  _qaRows = [];
  render();
}

let _mvSnap = [];

function openMove(sid){
  const ids = decIds(sid);
  const grp = ids.map(id=>DB[id] ? {...DB[id], id} : null).filter(Boolean);
  if(!grp.length) return;
  const rep      = grp[0];
  const total    = grp.reduce((s,i)=>s+(i.qty||0),0);
  const multiLoc = [...new Set(grp.map(i=>i.location))].length > 1;

  _mvSnap = grp.slice().sort((a,b)=>{
    const lc=(a.location||"").localeCompare(b.location||"");
    return lc!==0?lc:new Date(a.expDate||"9999")-new Date(b.expDate||"9999");

  let rows="";

    const locLine = multiLoc

    rows+=`<div class="brow">

      <input id="mv-${idx}" type="number" min="0" max="${item.qty||0}" value="0"

  });

  const destOpts = multiLoc
    ? LOCS.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join("")
    : LOCS.filter(l=>l!==rep.location).map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join("");

  const fromLabel = multiLoc
    ? `${[...new Set(grp.map(i=>i.location))].length} locations · ${total} total in stock`
    : `From: ${esc(rep.location)} · ${total} total in stock`;

  showModal(`<div class="mhandle"></div><h2>🚚 Move Stock</h2>
    <div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:16px">

      <div style="font-size:13px;color:var(--text2)">${fromLabel}</div>
    </div>
    <div class="fg">
      <label>Qty to move per batch (0 = skip)</label>
      ${rows}
      <div style="font-size:12px;color:var(--text3);margin-top:4px">Each batch keeps its expiration date at the destination.</div>
    </div>
    <div id="mv-tot" style="font-size:13px;font-weight:600;color:var(--blue);min-height:20px;margin-bottom:14px">Enter quantities above</div>
    <div class="fg">
      <label>Move To *</label>
      <select id="mv-dest" style="width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--r);font-size:16px;background:var(--bg2);color:var(--text)">
        ${destOpts}
      </select>

      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" onclick="doMove()">Move Stock</button>

function mvTot(){
  let t=0;
  _mvSnap.forEach((_,idx)=>{
    const v=parseInt(document.getElementById("mv-"+idx)?.value||"0");
    if(!isNaN(v)&&v>0) t+=v;
  });
  const el=document.getElementById("mv-tot");
  if(el) el.textContent=t>0?`Moving ${t} unit${t!==1?"s":""} total`:"Enter quantities above";
}

async function doMove(){
  const dest=document.getElementById("mv-dest")?.value;
  if(!dest){alert("Please select a destination.");return;}

  // Step 1: Read all values from DOM while modal still exists
  const ops=[];
  let total=0;
  for(let idx=0;idx<_mvSnap.length;idx++){
    const item=_mvSnap[idx];
    const mq=parseInt(document.getElementById("mv-"+idx)?.value||"0");
    if(isNaN(mq)||mq<=0) continue;
    if(mq>item.qty){
      alert(`Cannot move ${mq} of "${item.name}" (${item.expDate||"no exp"}, ${item.location}) — only ${item.qty||0} available.`);
      return;
    }
    ops.push({item,mq});
    total+=mq;
  }
  if(!total){alert("Enter at least one quantity greater than 0.");return;}

  // Step 2: Silent close before writes
  silentClose();

  // Step 3: Pre-capture destination records to avoid mid-flight read issues
  const destCache={};
  const snap=allItems();
  for(const {item} of ops){
    const ck=item.expDate+"||"+dest;
    if(!(ck in destCache)){
      const ex=snap.find(r=>r.id!==item.id&&r.name.toLowerCase().trim()===item.name.toLowerCase().trim()&&r.location===dest&&(r.expDate||"")===(item.expDate||""));
      destCache[ck]=ex?{id:ex.id,qty:ex.qty||0}:null;
    }
  }

  // Step 4: Write
  for(const {item,mq} of ops){
    // Find live source record right now
    const liveSrc=allItems().find(r=>r.name.toLowerCase().trim()===item.name.toLowerCase().trim()&&r.location===item.location&&(r.expDate||"")===(item.expDate||""))||item;
    const newSrc=(liveSrc.qty||0)-mq;
    if(newSrc<=0){
      await fDelete(liveSrc.id);
    } else {
      await fSetQty(liveSrc.id,newSrc);
    }
    const ck=item.expDate+"||"+dest;
    if(destCache[ck]){
      const {id,qty}=destCache[ck];
      await fSetQty(id,qty+mq);
      destCache[ck].qty=qty+mq;
    } else {
      await set(push(ref(db,"items")), clean({
        name:item.name,sku:item.sku||"",category:item.category||CATS[7],
        location:dest,qty:mq,locThresh:item.locThresh||DEF_LOW,
        grpThresh:item.grpThresh||DEF_LOW,expDate:item.expDate||"",notes:item.notes||""
      }));
    }
  }
  const fromLocs=[...new Set(_mvSnap.map(i=>i.location))].join(", ");
  await fLog(`Moved ${total} of "${_mvSnap[0].name}" from ${fromLocs} → ${dest}`);
  render();
}

function snackItems(){
  return Object.entries(SDB)
    .filter(([,v])=>v&&v.name&&String(v.name).trim()&&v.location)
    .map(([id,v])=>({...v, id, qty:Number(v.qty)||0, locThresh:Number(v.locThresh)||DEF_LOW}));
}

function snackFiltered(){
  let arr=snackItems();
  if(SUI.tab>0) arr=arr.filter(i=>i.location===SLOCS[SUI.tab-1]);
  if(SUI.fCat!=="all") arr=arr.filter(i=>i.category===SUI.fCat);
  if(SUI.search){ const q=SUI.search.toLowerCase(); arr=arr.filter(i=>i.name.toLowerCase().includes(q)||(i.notes||"").toLowerCase().includes(q)); }
  return arr.sort((a,b)=>a.name.localeCompare(b.name));
}

function snackStatus(i){
  if(!(i.qty||0)) return "out";
  if(i.expDate&&new Date(i.expDate)<new Date()) return "exp";
  return (i.qty||0)<=(i.locThresh||DEF_LOW)?"low":"ok";
}

// ── Render snacks expiration calendar ──
function renderSnackExp(app){
  const arr=snackItems(), now=new Date();
  const withD=arr.filter(i=>i.expDate), noD=arr.filter(i=>!i.expDate);
  const bkts={};
  withD.forEach(i=>{ const d=new Date(i.expDate),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; (bkts[k]=bkts[k]||[]).push(i); });
  const keys=Object.keys(bkts).sort();
  function sUrgency(k){ const[y,m]=k.split("-"),me=new Date(+y,+m,0); if(me<now)return"past"; const ms=new Date(+y,+m-1,1); if(ms.getFullYear()===now.getFullYear()&&ms.getMonth()===now.getMonth())return"cur"; const nxt=new Date(now.getFullYear(),now.getMonth()+1,1); if(ms>=nxt&&ms<new Date(now.getFullYear(),now.getMonth()+2,1))return"next"; return"future"; }
  const US={past:{b:"var(--red)",h:"var(--red)",bg:"var(--red-bg)",ic:"🚫"},cur:{b:"var(--yellow)",h:"var(--yellow)",bg:"var(--yellow-bg)",ic:"⚠️"},next:{b:"var(--yellow)",h:"var(--yellow)",bg:"var(--yellow-bg)",ic:"⏳"},future:{b:"var(--border)",h:"var(--text2)",bg:"var(--bg2)",ic:"🗓️"}};
  function sMlabel(k){ const[y,m]=k.split("-"); return new Date(+y,+m-1,1).toLocaleString("default",{month:"long",year:"numeric"}); }
  const expC=withD.filter(i=>new Date(i.expDate)<now).length;
  const n30=withD.filter(i=>{ const d=daysTo(i.expDate); return d!==null&&d>=0&&d<=30; }).length;
  function sIrow(i){
    const d=daysTo(i.expDate);
    const urgClr=d===null?"var(--text3)":d<=0?"var(--red)":d<=30?"var(--yellow)":"var(--text2)";
    const urgLbl=d===null?"":d<=0?" · EXPIRED":` · ${d}d left`;
    return `<div class="arow">
      <div class="arow-info"><div class="arow-name">${esc(i.name)}</div><div class="arow-sub">${esc(i.location)} · ${esc(i.category||"—")}</div></div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700;color:${urgClr}">${i.expDate||"—"}${urgLbl}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">Qty: ${i.qty}</div>
      </div></div>`;
  }
  let h=`<div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="sc"><div class="sc-lbl">With Date</div><div class="sc-val">${withD.length}</div></div>
    <div class="sc"><div class="sc-lbl">Expired</div><div class="sc-val ${expC>0?"r":""}">${expC}</div></div>
    <div class="sc"><div class="sc-lbl">Next 30 Days</div><div class="sc-val ${n30>0?"y":""}">${n30}</div></div>
  </div>`;
  if(!keys.length&&!noD.length){ h+=`<div class="card"><div class="empty"><div class="empty-icon">🗓️</div>No expiration dates set yet.</div></div>`; app.innerHTML=h; return; }
  keys.forEach(k=>{ const u=sUrgency(k),s=US[u],its=bkts[k].slice().sort((a,b)=>new Date(a.expDate)-new Date(b.expDate)); h+=`<div class="card ecal" style="border-left-color:${s.b}"><div class="sec-hdr" style="color:${s.h};background:${s.bg};display:flex;justify-content:space-between;align-items:center"><span>${s.ic} ${sMlabel(k)}</span><span style="font-size:12px;opacity:.8">${its.length} item${its.length!==1?"s":""}</span></div>${its.map(sIrow).join("")}</div>`; });
  if(noD.length){ h+=`<div class="card" style="opacity:.75"><div class="sec-hdr" style="color:var(--text3);display:flex;justify-content:space-between"><span>📦 No Expiration Date</span><span style="font-size:12px">${noD.length} item${noD.length!==1?"s":""}</span></div>${noD.sort((a,b)=>a.name.localeCompare(b.name)).map(sIrow).join("")}</div>`; }
  app.innerHTML=h;
}

function getFacility(location){
  const APC_JMA=["APC Storage","APC Weight Room","APC Loading Dock","APC 3rd Floor","JMA Rowing Side","JMA Weight Room Side"];
  return APC_JMA.includes(location)?"APC/JMA":"Rodkin";
}

function isoWeek(ts){
  const d=new Date(ts); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const yr=d.getFullYear();
  const wk=Math.ceil((((d-new Date(yr,0,1))/86400000)+1)/7);
  return `${yr}-W${String(wk).padStart(2,"0")}`;
}

function weekLabel(isoW){
  const[yr,wStr]=isoW.split("-W"); const wn=parseInt(wStr);
  const jan4=new Date(+yr,0,4);
  const mon=new Date(jan4.getTime()+(wn-1)*7*86400000-(jan4.getDay()||7-1)*86400000);
  const sun=new Date(mon.getTime()+6*86400000);
  const fmt=d=>d.toLocaleDateString("default",{month:"short",day:"numeric"});
  return `${fmt(mon)} – ${fmt(sun)}`;
}
